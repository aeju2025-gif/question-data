<!doctype html>
<html lang="ko" class="h-full">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>서남 5-1 질문방</title>
  <script src="https://cdn.tailwindcss.com/3.4.17"></script>
  <script src="https://cdn.jsdelivr.net/npm/lucide@0.263.0/dist/umd/lucide.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/qrcode-generator@1.4.4/qrcode.min.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    * { font-family: 'Pretendard', sans-serif; -webkit-tap-highlight-color: transparent; }
    .fade-in { animation: fadeIn 0.2s ease; }
    @keyframes fadeIn { from { opacity:0; transform:translateY(5px); } to { opacity:1; transform:translateY(0); } }
    .modal-bg { backdrop-filter: blur(8px); background: rgba(15, 23, 42, 0.9); }
    .no-scrollbar::-webkit-scrollbar { display: none; }
    .star-rating { color: #475569; cursor: pointer; transition: color 0.2s; }
    .star-rating.active { color: #facc15; }
  </style>
</head>
<body class="h-full bg-[#0f172a] text-[#e2e8f0]">

  <div id="app" class="h-full w-full overflow-auto">
    
    <div id="login-view" class="flex items-center justify-center h-full p-6">
      <div class="max-w-md w-full bg-[#1e293b] p-8 rounded-3xl border border-[#334155] shadow-2xl text-center">
        <div class="text-6xl mb-6">💬</div>
        <h1 class="text-3xl font-800 text-white mb-6 italic">서남 5-1 질문방</h1>
        <div class="space-y-4 mb-8 text-left">
          <input id="login-name" type="text" placeholder="이름 (교사는 '관리자')" class="w-full px-5 py-4 rounded-2xl bg-[#0f172a] border border-[#334155] text-white outline-none focus:border-indigo-500">
          <input id="login-pw" type="password" placeholder="비밀번호" class="w-full px-5 py-4 rounded-2xl bg-[#0f172a] border border-[#334155] text-white outline-none focus:border-indigo-500">
          <button onclick="handleLogin()" class="w-full py-5 rounded-2xl font-800 text-xl bg-[#6366f1] text-white shadow-lg active:scale-95 transition-all">입장하기</button>
        </div>
        <div id="qr-home" class="p-3 bg-white rounded-2xl inline-block"></div>
      </div>
    </div>

    <div id="teacher-view" class="hidden h-full flex flex-col">
      <header class="p-5 bg-[#1e293b] border-b border-[#334155] flex justify-between items-center">
        <div class="flex items-center gap-3">
          <button onclick="logout()" class="text-slate-400 hover:text-white"><i data-lucide="log-out"></i></button>
          <h2 class="text-white font-800 text-xl" id="teacher-date-title">오늘의 질문</h2>
        </div>
        <div class="flex gap-2">
          <button onclick="openUserAdmin()" class="bg-slate-700 p-3 rounded-xl text-xs font-800 border border-slate-600">명단관리</button>
          <button onclick="toggleDateModal(true, 'teacher')" class="bg-indigo-600 p-3 rounded-xl border border-indigo-400 shadow-lg"><i data-lucide="calendar" class="w-5 h-5"></i></button>
        </div>
      </header>
      <div class="flex-1 overflow-auto p-6">
        <div id="teacher-list" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6"></div>
      </div>
    </div>

    <div id="student-view" class="hidden h-full flex flex-col">
      <header class="p-5 flex items-center justify-between bg-[#1e293b] border-b border-[#334155]">
        <div class="flex items-center gap-3">
          <button onclick="logout()" class="text-slate-400 hover:text-white"><i data-lucide="log-out"></i></button>
          <div>
            <span id="display-student-name" class="text-white font-800 block leading-tight"></span>
            <span id="student-date-title" class="text-[10px] text-indigo-400 font-700 underline underline-offset-2">오늘의 질문</span>
          </div>
        </div>
        <button onclick="toggleDateModal(true, 'student')" class="bg-[#0f172a] px-4 py-2 rounded-xl border border-[#334155] text-xs font-800 flex items-center gap-2">
            <i data-lucide="history" class="w-3 h-3"></i>기록 찾기
        </button>
      </header>
      <div class="flex-1 overflow-auto p-5 space-y-4" id="student-list"></div>
      <div class="p-6 bg-[#1e293b] border-t border-[#475569]">
        <form id="question-form" class="max-w-2xl mx-auto flex gap-2">
          <input id="inp-question" placeholder="질문을 입력하세요..." class="flex-1 px-5 py-4 rounded-2xl bg-[#0f172a] text-white border border-[#334155] outline-none" required>
          <button type="submit" class="px-6 rounded-2xl font-800 bg-[#6366f1] text-white">전송</button>
        </form>
      </div>
    </div>

    <div id="date-modal" class="hidden fixed inset-0 z-[110] modal-bg flex items-center justify-center p-6" onclick="toggleDateModal(false)">
      <div class="bg-[#1e293b] w-full max-w-sm rounded-3xl border border-slate-600 overflow-hidden shadow-2xl" onclick="event.stopPropagation()">
        <div class="p-5 border-b border-slate-700 flex justify-between items-center">
            <h4 class="text-white font-800">기록 날짜 선택</h4>
            <button onclick="toggleDateModal(false)" class="text-slate-400"><i data-lucide="x" class="w-5 h-5"></i></button>
        </div>
        <div id="modal-date-list" class="max-h-[50vh] overflow-y-auto p-4 space-y-2 no-scrollbar"></div>
      </div>
    </div>

    <div id="share-modal" class="hidden fixed inset-0 z-[200] modal-bg flex items-center justify-center p-4">
      <div class="bg-[#1e293b] w-full max-w-2xl h-[80vh] rounded-3xl border border-indigo-500 shadow-2xl flex flex-col overflow-hidden">
        <div class="p-5 border-b border-slate-700 flex justify-between items-center bg-indigo-900/30">
          <div class="flex flex-col"><span class="text-[10px] text-indigo-300 font-900 uppercase">Live Discussion</span><h3 class="text-white font-800" id="share-title">함께 이야기해요</h3></div>
          <button onclick="closeShare()" class="text-slate-400 hover:text-white" id="close-share-btn"><i data-lucide="x"></i></button>
        </div>
        <div id="share-content" class="p-6 bg-[#0f172a]/50 text-white text-lg font-700 border-b border-slate-800"></div>
        <div id="share-comments" class="flex-1 overflow-y-auto p-5 space-y-3 no-scrollbar"></div>
        <div class="p-4 bg-[#1e293b] border-t border-slate-700 flex gap-2">
          <input id="comment-input" type="text" placeholder="댓글을 남겨주세요..." class="flex-1 bg-[#0f172a] border border-slate-600 rounded-xl px-4 py-3 text-white outline-none">
          <button onclick="sendComment()" class="bg-indigo-600 px-5 rounded-xl font-800 text-white">게시</button>
        </div>
      </div>
    </div>

    <div id="user-admin-modal" class="hidden fixed inset-0 z-[150] modal-bg flex items-center justify-center p-6">
      <div class="bg-[#1e293b] w-full max-w-lg rounded-3xl border border-slate-600 flex flex-col max-h-[70vh]">
        <div class="p-5 border-b border-slate-700 flex justify-between items-center"><h3 class="text-xl font-800 text-white">학생 명단</h3><button onclick="document.getElementById('user-admin-modal').classList.add('hidden')"><i data-lucide="x"></i></button></div>
        <div id="user-list-container" class="flex-1 overflow-y-auto p-4 space-y-2"></div>
      </div>
    </div>

    <div id="pw-change-modal" class="hidden fixed inset-0 z-[300] modal-bg flex items-center justify-center p-6">
      <div class="bg-[#1e293b] p-8 rounded-3xl border border-indigo-500 w-full max-w-sm text-center">
        <h3 class="text-xl font-800 mb-4">🔐 비밀번호 변경</h3>
        <p class="text-xs text-slate-400 mb-4">처음 접속하셨군요! 새 비밀번호를 정해주세요.</p>
        <input id="new-pw" type="password" placeholder="새 비밀번호" class="w-full mb-3 p-4 rounded-xl bg-[#0f172a] border border-slate-600 text-white outline-none focus:border-indigo-500">
        <button onclick="updatePassword()" class="w-full py-4 bg-indigo-600 rounded-xl font-800 shadow-lg">변경 완료 및 입장</button>
      </div>
    </div>

  </div>

  <script>
    // --- Firebase 설정 ---
    const firebaseConfig = {
      apiKey: "AIzaSyCTvks95Z82H4xljUqdqQRIEcJJcUT0PhA",
      authDomain: "questiondatabase-71d3e.firebaseapp.com",
      projectId: "questiondatabase-71d3e",
      storageBucket: "questiondatabase-71d3e.firebasestorage.app",
      messagingSenderId: "282631336520",
      appId: "1:282631336520:web:8726f50a5dc24a5d5ade7d",
      measurementId: "G-Y9F1XGFQMF",
      databaseURL: "https://questiondatabase-71d3e-default-rtdb.firebaseio.com"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    
    let currentUser = null; 
    let allData = [];
    let currentShareId = null;
    const getToday = () => new Date().toLocaleDateString('sv-SE');
    
    let teacherSelectedDate = getToday();
    let studentSelectedDate = getToday();

    // --- 로그인 로직 ---
    async function handleLogin() {
      const name = document.getElementById('login-name').value.trim();
      const pw = document.getElementById('login-pw').value.trim();
      if(!name || !pw) return alert("이름과 비밀번호를 모두 입력해주세요.");

      if(name === "관리자") {
        const snap = await db.ref('users/admin').once('value');
        const data = snap.val() || { pw: "1111", isInitial: true };
        if(data.pw === pw) { 
            currentUser = { name: "관리자", role: "teacher", isInitial: data.isInitial }; 
            checkPw(); 
        } else alert("비밀번호가 틀렸습니다."); 
        return;
      }

      const snap = await db.ref(`users/${name}`).once('value');
      let data = snap.val();
      if(!data && pw === "1111") { 
          data = { pw: "1111", isInitial: true }; 
          await db.ref(`users/${name}`).set(data); 
      }

      if(data && data.pw === pw) { 
          currentUser = { name, role: "student", isInitial: data.isInitial }; 
          checkPw(); 
      } else alert("정보가 일치하지 않습니다. (신규 학생은 비번 1111)");
    }

    function checkPw() { 
        if(currentUser.isInitial) document.getElementById('pw-change-modal').classList.remove('hidden'); 
        else startApp(); 
    }

    async function updatePassword() {
      const np = document.getElementById('new-pw').value;
      if(!np) return alert("새 비밀번호를 입력하세요.");
      const path = currentUser.name === "관리자" ? 'users/admin' : `users/${currentUser.name}`;
      await db.ref(path).update({ pw: np, isInitial: false });
      currentUser.isInitial = false; 
      document.getElementById('pw-change-modal').classList.add('hidden'); 
      startApp();
    }

    function startApp() {
      document.getElementById('login-view').classList.add('hidden');
      if(currentUser.role === 'teacher') document.getElementById('teacher-view').classList.remove('hidden');
      else { 
          document.getElementById('student-view').classList.remove('hidden'); 
          document.getElementById('display-student-name').textContent = currentUser.name; 
      }
      initDatabase(); 
      initShareListener();
    }

    function logout() { location.reload(); }

    // --- 날짜 필터링 ---
    function toggleDateModal(show, role) {
        const modal = document.getElementById('date-modal');
        if (show) { updateDateList(role); modal.classList.remove('hidden'); } 
        else { modal.classList.add('hidden'); }
    }

    function updateDateList(role) {
        const container = document.getElementById('modal-date-list');
        const dates = [...new Set(allData.filter(d => d && d.date && d.date !== 'undefined').map(d => d.date))].sort().reverse();
        if (dates.length === 0) { container.innerHTML = `<p class="text-center text-slate-500 py-10 text-sm">기록된 날짜가 없습니다.</p>`; return; }
        container.innerHTML = dates.map(date => {
            const isActive = (role === 'teacher' ? teacherSelectedDate : studentSelectedDate) === date;
            return `<button onclick="selectDate('${date}', '${role}')" class="w-full p-4 rounded-2xl flex justify-between items-center transition-all ${isActive ? 'bg-indigo-600 text-white shadow-lg' : 'bg-[#0f172a] text-slate-400 hover:bg-slate-800'}"><span class="font-800">${date}</span>${isActive ? '<i data-lucide="check-circle-2" class="w-5 h-5"></i>' : '<i data-lucide="chevron-right" class="w-4 h-4"></i>'}</button>`;
        }).join('');
        lucide.createIcons();
    }

    function selectDate(date, role) {
        if (role === 'teacher') teacherSelectedDate = date; else studentSelectedDate = date;
        renderAll(); toggleDateModal(false);
    }

    // --- 질문 전송 (가장 중요한 부분) ---
    document.getElementById('question-form').onsubmit = async (e) => {
      e.preventDefault();
      const inp = document.getElementById('inp-question');
      const today = getToday();
      const text = inp.value.trim();

      if(!text) return;

      try {
        await db.ref('questions').push({
          student_name: currentUser.name,
          question: text,
          date: today,
          ts: Date.now(),
          rating: 1 // 기본 별점 1개
        });
        
        alert("질문이 전송되었습니다!"); // 전송 확인창
        inp.value = '';
        studentSelectedDate = today;
        renderAll();
      } catch (err) {
        console.error(err);
        alert("전송 실패! Firebase 규칙을 확인하세요.");
      }
    };

    // --- 데이터 렌더링 ---
    function initDatabase() {
      db.ref('questions').on('value', (snapshot) => {
        const data = snapshot.val();
        allData = data ? Object.keys(data).map(key => ({ ...data[key], id: key })) : [];
        renderAll();
      });
    }

    function renderAll() { 
        if(!currentUser) return;
        if(currentUser.role === 'teacher') renderTeacher(); 
        else renderStudent(); 
    }

    function renderTeacher() {
      const list = document.getElementById('teacher-list');
      const filtered = allData.filter(d => d && d.date === teacherSelectedDate);
      document.getElementById('teacher-date-title').textContent = teacherSelectedDate === getToday() ? "오늘의 질문" : teacherSelectedDate;
      
      if (filtered.length === 0) { list.innerHTML = `<div class="col-span-full py-20 text-center text-slate-500">질문이 없습니다.</div>`; }
      else {
          list.innerHTML = filtered.map(q => {
              const stars = q.rating || 1;
              let starHtml = '';
              for(let i=1; i<=5; i++) {
                  starHtml += `<i data-lucide="star" class="star-rating w-5 h-5 ${i <= stars ? 'active fill-current' : ''}" onclick="saveRating('${q.id}', ${i})"></i>`;
              }
              return `<div class="fade-in bg-[#1e293b] p-5 rounded-2xl border border-slate-700 shadow-xl">
              <div class="flex justify-between mb-2"><span class="text-indigo-400 font-900 text-xs">${q.student_name}</span><div class="flex gap-2">
                  <button onclick="shareQuestion('${q.id}')" class="text-emerald-400 hover:scale-110"><i data-lucide="share-2" class="w-4 h-4"></i></button>
                  <button onclick="deleteItem('${q.id}')" class="text-slate-600"><i data-lucide="trash-2" class="w-4 h-4"></i></button>
              </div></div>
              <p class="text-white font-600 mb-4">${q.question}</p>
              <div class="flex gap-1 mb-4">${starHtml}</div>
              <div class="flex gap-2"><input id="fb-${q.id}" value="${q.feedback || ''}" placeholder="답변..." class="flex-1 bg-[#0f172a] border border-slate-700 rounded-lg px-3 py-2 text-xs text-white">
                 <button onclick="saveFeedback('${q.id}')" class="bg-indigo-600 px-3 rounded-lg text-xs font-800 text-white">저장</button></div></div>`;
          }).join('');
      }
      lucide.createIcons();
    }

    async function saveRating(id, rating) { await db.ref('questions/'+id).update({ rating: rating }); }
    async function saveFeedback(id) { const fb = document.getElementById('fb-'+id).value; await db.ref('questions/'+id).update({ feedback: fb }); alert('저장됨'); }

    function renderStudent() {
      const list = document.getElementById('student-list');
      const myItems = allData.filter(d => d && d.student_name === currentUser.name && d.date === studentSelectedDate);
      document.getElementById('student-date-title').textContent = studentSelectedDate === getToday() ? "오늘의 질문" : `${studentSelectedDate}의 기록`;
      
      if (myItems.length === 0) { list.innerHTML = `<div class="py-20 text-center text-slate-500">작성한 질문이 없습니다.</div>`; }
      else {
          list.innerHTML = myItems.reverse().map(q => {
              const stars = q.rating || 1;
              let starHtml = '';
              for(let i=1; i<=stars; i++) starHtml += '⭐';
              return `<div class="fade-in bg-[#1e293b] p-5 rounded-2xl border border-slate-700">
                <div class="flex justify-between items-start mb-2"><p class="text-white font-700">${q.question}</p><span class="text-xs">${starHtml}</span></div>
                ${q.feedback ? `<div class="mt-3 p-3 bg-indigo-900/20 rounded-xl text-indigo-300 text-sm italic border border-indigo-500/20">A. ${q.feedback}</div>` : '<div class="mt-2 text-[10px] text-slate-600 italic">답변 대기 중...</div>'}
              </div>`;
          }).join('');
      }
      lucide.createIcons();
    }

    // --- 기타 기능 (명단관리, 라이브공유) ---
    async function openUserAdmin() {
      const snap = await db.ref('users').once('value'); const users = snap.val() || {}; const container = document.getElementById('user-list-container');
      document.getElementById('user-admin-modal').classList.remove('hidden');
      container.innerHTML = Object.keys(users).map(name => {
        if(name === 'admin') return '';
        return `<div class="flex justify-between items-center p-3 bg-[#0f172a] rounded-xl border border-slate-700"><div><span class="text-white font-bold">${name}</span></div>
            <div class="flex gap-2"><button onclick="resetUserPw('${name}')" class="text-xs bg-indigo-900/50 text-indigo-300 px-3 py-1 rounded-lg">초기화</button><button onclick="deleteUser('${name}')" class="text-xs bg-red-900/50 text-red-300 px-3 py-1 rounded-lg">삭제</button></div></div>`;
      }).join('');
    }
    async function resetUserPw(name) { if(confirm(`${name} 초기화?`)) { await db.ref(`users/${name}`).update({ pw: "1111", isInitial: true }); openUserAdmin(); } }
    async function deleteUser(name) { if(confirm(`${name} 삭제?`)) { await db.ref(`users/${name}`).remove(); openUserAdmin(); } }

    function initShareListener() {
      db.ref('current_share').on('value', (snap) => {
        const shareData = snap.val();
        if(shareData && shareData.active) {
          currentShareId = shareData.qId; document.getElementById('share-modal').classList.remove('hidden');
          document.getElementById('share-content').textContent = `Q. ${shareData.question}`;
          document.getElementById('share-title').textContent = `${shareData.student_name}님의 질문`;
          document.getElementById('close-share-btn').style.display = (currentUser.role === 'teacher') ? 'block' : 'none';
          loadComments(shareData.qId);
        } else { document.getElementById('share-modal').classList.add('hidden'); currentShareId = null; }
      });
    }
    async function shareQuestion(qId) { const q = allData.find(d => d.id === qId); await db.ref('current_share').set({ active: true, qId, question: q.question, student_name: q.student_name }); }
    async function closeShare() { await db.ref('current_share').remove(); }
    function loadComments(qId) {
      db.ref(`comments/${qId}`).on('value', (snap) => {
        const comments = snap.val() || {}; const container = document.getElementById('share-comments');
        container.innerHTML = Object.values(comments).map(c => `<div class="fade-in flex flex-col ${c.name === currentUser.name ? 'items-end' : 'items-start'}">
            <span class="text-[10px] text-slate-500 mb-1 px-1">${c.name}</span>
            <div class="${c.name === '관리자' ? 'bg-indigo-600' : 'bg-slate-700'} px-4 py-2 rounded-2xl max-w-[80%] text-sm">${c.text}</div></div>`).join(''); container.scrollTop = container.scrollHeight;
      });
    }
    async function sendComment() {
      const input = document.getElementById('comment-input'); const text = input.value.trim(); if(!text || !currentShareId) return;
      await db.ref(`comments/${currentShareId}`).push({ name: currentUser.name, text: text, ts: Date.now() }); input.value = '';
    }

    async function deleteItem(id) { if(confirm('이 질문을 삭제할까요?')) await db.ref('questions/'+id).remove(); }
    function generateQR(c) { const qr = qrcode(0, 'M'); qr.addData(window.location.href); qr.make(); c.innerHTML = qr.createSvgTag(4,0); }
    generateQR(document.getElementById('qr-home'));
    lucide.createIcons();
  </script>
</body>
</html>
