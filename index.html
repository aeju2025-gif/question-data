<!doctype html>
<html lang="ko" class="h-full">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>우리반 실시간 Q&A</title>
  
  <script src="https://cdn.tailwindcss.com/3.4.17"></script>
  <script src="https://cdn.jsdelivr.net/npm/lucide@0.263.0/dist/umd/lucide.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/qrcode-generator@1.4.4/qrcode.min.js"></script>
  
  <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>

  <link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    * { font-family: 'Pretendard', sans-serif; }
    .fade-in { animation: fadeIn 0.3s ease; }
    @keyframes fadeIn { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:translateY(0); } }
  </style>
</head>
<body class="h-full bg-[#0f172a] text-[#e2e8f0]">
  <div id="app" class="h-full w-full overflow-auto">
    
    <div id="view-selector" class="flex items-center justify-center h-full">
      <div class="text-center p-8 max-w-md w-full">
        <div class="text-5xl mb-6">💬</div>
        <h1 class="text-3xl font-800 text-white mb-2">우리반 Q&A</h1>
        <p class="text-slate-400 mb-10 text-sm">실시간으로 질문하고 답변을 확인하세요.</p>
        <button onclick="showView('teacher')" class="w-full py-4 rounded-xl font-600 text-lg mb-4 bg-[#6366f1] text-white transition-all hover:scale-[1.02]">
          교사용 대시보드
        </button> 
        <button onclick="showView('student')" class="w-full py-4 rounded-xl font-600 text-lg bg-[#1e293b] text-[#e2e8f0] border border-[#334155] transition-all hover:scale-[1.02]">
          학생 질문하기
        </button>
        <div class="mt-8">
          <p class="text-slate-500 text-xs mb-3">학생 접속용 QR</p>
          <div id="qr-home" class="inline-block bg-white p-3 rounded-xl"></div>
        </div>
      </div>
    </div>

    <div id="student-view" class="hidden h-full flex flex-col">
      <header class="p-4 flex items-center gap-3 bg-[#1e293b] border-b border-[#334155]">
        <button onclick="showView('home')" class="text-slate-400 hover:text-white"><i data-lucide="arrow-left"></i></button>
        <h2 class="text-white font-700 text-lg">질문 보내기</h2>
      </header>
      <div class="flex-1 overflow-auto p-4 space-y-3" id="student-list"></div>
      <div class="p-4 bg-[#1e293b] border-t border-[#334155]">
        <form id="question-form" class="space-y-3">
          <input id="inp-name" type="text" placeholder="이름을 입력하세요" class="w-full px-4 py-3 rounded-xl text-sm bg-[#0f172a] text-white border border-[#334155] outline-none focus:ring-2 focus:ring-[#6366f1]" required> 
          <textarea id="inp-question" placeholder="궁금한 내용을 적어주세요..." rows="2" class="w-full px-4 py-3 rounded-xl text-sm bg-[#0f172a] text-white border border-[#334155] outline-none focus:ring-2 focus:ring-[#6366f1] resize-none" required></textarea> 
          <button type="submit" id="btn-submit" class="w-full py-3 rounded-xl font-600 text-white bg-[#6366f1]">질문 전송</button>
        </form>
      </div>
    </div>

    <div id="teacher-view" class="hidden h-full flex flex-col">
      <header class="p-4 flex items-center justify-between bg-[#1e293b] border-b border-[#334155]">
        <div class="flex items-center gap-3">
          <button onclick="showView('home')" class="text-slate-400 hover:text-white"><i data-lucide="arrow-left"></i></button>
          <h2 class="text-white font-700 text-lg">선생님 확인용</h2>
        </div>
        <span id="q-count" class="text-xs px-3 py-1 rounded-full bg-[#6366f1] text-white">0</span>
      </header>
      <div class="flex-1 overflow-auto p-4 space-y-3" id="teacher-list"></div>
      <div class="p-4 text-center bg-[#1e293b] border-t border-[#334155]">
        <div id="qr-teacher" class="inline-block bg-white p-2 rounded-lg mb-2"></div>
        <p class="text-slate-500 text-xs">학생들에게 이 화면을 보여주세요.</p>
      </div>
    </div>
  </div>

  <script>
    // 1. Firebase 설정 (정일님 정보 적용)
    const firebaseConfig = {
      apiKey: "AIzaSyCTvks95Z82H4xljUqdqQRIEcJJcUT0PhA",
      authDomain: "questiondatabase-71d3e.firebaseapp.com",
      projectId: "questiondatabase-71d3e",
      storageBucket: "questiondatabase-71d3e.firebasestorage.app",
      messagingSenderId: "282631336520",
      appId: "1:282631336520:web:8726f50a5dc24a5d5ade7d",
      measurementId: "G-Y9F1XGFQMF",
      databaseURL: "https://questiondatabase-71d3e-default-rtdb.firebaseio.com" // 자동 생성 주소
    };

    // Firebase 초기화
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let allData = [];

    // 실시간 데이터 감시 (질문이 생기면 바로 실행됨)
    db.ref('questions').on('value', (snapshot) => {
      const data = snapshot.val();
      allData = data ? Object.keys(data).map(key => ({ ...data[key], id: key })) : [];
      renderAll();
    });

    // 화면 전환 함수
    function showView(v) {
      document.getElementById('view-selector').classList.toggle('hidden', v !== 'home');
      document.getElementById('student-view').classList.toggle('hidden', v !== 'student');
      document.getElementById('teacher-view').classList.toggle('hidden', v !== 'teacher');
      lucide.createIcons();
    }

    // QR 코드 생성
    function generateQR(container) {
      const url = window.location.href.split('#')[0] + '#student';
      const qr = qrcode(0, 'M');
      qr.addData(url);
      qr.make();
      container.innerHTML = qr.createSvgTag(4, 0);
    }
    generateQR(document.getElementById('qr-home'));
    generateQR(document.getElementById('qr-teacher'));

    if (window.location.hash === '#student') showView('student');

    // 질문 보내기 로직
    document.getElementById('question-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn = document.getElementById('btn-submit');
      const name = document.getElementById('inp-name').value.trim();
      const text = document.getElementById('inp-question').value.trim();

      btn.disabled = true;
      btn.textContent = '보내는 중...';

      try {
        await db.ref('questions').push({
          student_name: name,
          question: text,
          feedback: '',
          status: 'pending',
          created_at: new Date().toISOString()
        });
        document.getElementById('inp-question').value = '';
        alert('질문이 성공적으로 전송되었습니다! ✨');
      } catch (err) {
        alert('전송 실패! 인터넷 연결이나 Database 규칙을 확인하세요.');
      } finally {
        btn.disabled = false;
        btn.textContent = '질문 전송';
      }
    });

    // 리스트 화면 그리기
    function renderAll() {
      // 학생 리스트
      const studentContainer = document.getElementById('student-list');
      const myName = document.getElementById('inp-name').value.trim();
      const myItems = allData.filter(d => d.student_name === myName && myName !== '');
      
      studentContainer.innerHTML = myItems.length === 0 
        ? '<p class="text-slate-500 text-center text-sm py-8">이름을 입력하면 답변을 볼 수 있습니다.</p>'
        : myItems.reverse().map(q => `
          <div class="fade-in bg-[#1e293b] border border-[#334155] rounded-xl p-4">
            <p class="text-white text-sm mb-2">${esc(q.question)}</p>
            ${q.feedback ? `<div class="bg-[#0f172a] rounded-lg p-3 text-sm text-indigo-300">답변: ${esc(q.feedback)}</div>` : '<p class="text-xs text-slate-500">답변 대기 중...</p>'}
          </div>
        `).join('');

      // 교사 리스트
      const teacherContainer = document.getElementById('teacher-list');
      const sorted = [...allData].sort((a,b) => (a.status === 'pending' ? -1 : 1));
      
      teacherContainer.innerHTML = sorted.length === 0
        ? '<p class="text-slate-500 text-center text-sm py-8">질문이 아직 없습니다.</p>'
        : sorted.map(q => `
          <div class="fade-in bg-[#1e293b] border border-[#334155] rounded-xl p-4">
            <div class="flex justify-between items-center mb-2">
              <span class="text-white font-600 text-sm">${esc(q.student_name)}</span>
              <button onclick="deleteItem('${q.id}')" class="text-slate-600 hover:text-red-400"><i data-lucide="trash-2" style="width:14px;"></i></button>
            </div>
            <p class="text-slate-300 text-sm mb-3">${esc(q.question)}</p>
            ${q.status === 'pending' ? `
              <div class="flex gap-2">
                <input type="text" id="fb-${q.id}" placeholder="답변 입력..." class="flex-1 px-3 py-2 rounded-lg text-sm bg-[#0f172a] border border-[#334155] text-white outline-none">
                <button onclick="sendFeedback('${q.id}')" class="px-4 py-2 bg-[#6366f1] text-white text-sm rounded-lg">전송</button>
              </div>
            ` : `<div class="bg-[#0f172a] p-2 rounded text-sm text-indigo-300">완료됨: ${esc(q.feedback)}</div>`}
          </div>
        `).join('');
      
      document.getElementById('q-count').textContent = allData.filter(d => d.status === 'pending').length + '개 대기';
      lucide.createIcons();
    }

    async function sendFeedback(id) {
      const val = document.getElementById('fb-' + id).value.trim();
      if (!val) return;
      await db.ref('questions/' + id).update({ feedback: val, status: 'answered' });
    }

    async function deleteItem(id) {
      if (confirm('삭제하시겠습니까?')) await db.ref('questions/' + id).remove();
    }

    function esc(s) {
      const d = document.createElement('div');
      d.textContent = s;
      return d.innerHTML;
    }

    document.getElementById('inp-name').addEventListener('input', renderAll);
    lucide.createIcons();
  </script>
</body>
</html>
