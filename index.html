<!doctype html>
<html lang="ko" class="h-full">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>서남 5-1 질문의 방</title>
  <script src="https://cdn.tailwindcss.com/3.4.17"></script>
  <script src="https://cdn.jsdelivr.net/npm/lucide@0.263.0/dist/umd/lucide.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/qrcode-generator@1.4.4/qrcode.min.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    * { font-family: 'Pretendard', sans-serif; -webkit-tap-highlight-color: transparent; }
    .fade-in { animation: fadeIn 0.3s ease; }
    @keyframes fadeIn { from { opacity:0; transform:translateY(5px); } to { opacity:1; transform:translateY(0); } }
    .modal-bg { backdrop-filter: blur(16px); background: rgba(15, 23, 42, 0.9); }
    .tab-active { background-color: #6366f1; color: white; border-color: #6366f1; }
    .star-active { fill: #f59e0b; color: #f59e0b; }
    .star-inactive { fill: none; color: #475569; }
    .no-scrollbar::-webkit-scrollbar { display: none; }
  </style>
</head>
<body class="h-full bg-[#0f172a] text-[#e2e8f0]">

  <div id="app" class="h-full w-full overflow-auto">
    
    <div id="login-view" class="flex items-center justify-center h-full p-6">
      <div class="max-w-md w-full bg-[#1e293b] p-8 rounded-3xl border border-[#334155] shadow-2xl text-center">
        <h1 class="text-3xl font-800 text-white mb-2 italic text-indigo-400">서남 5-1 질문의 방</h1>
        <div class="bg-indigo-500/10 p-4 rounded-2xl mb-6 text-indigo-300 text-xs leading-relaxed">
            처음 오셨나요? 이름과 <b class="text-white underline">초기비밀번호 1111</b>을 입력하면<br>자신만의 비밀번호를 설정할 수 있습니다.
        </div>
        <div class="space-y-4 mb-8 text-left">
          <input id="login-name" type="text" placeholder="이름" class="w-full px-5 py-4 rounded-2xl bg-[#0f172a] border border-[#334155] text-white outline-none">
          <input id="login-pw" type="password" placeholder="비밀번호 또는 1111" class="w-full px-5 py-4 rounded-2xl bg-[#0f172a] border border-[#334155] text-white outline-none">
          <button onclick="handleLogin()" class="w-full py-5 rounded-2xl font-800 text-xl bg-[#6366f1] text-white shadow-lg">입장하기</button>
        </div>
        <div id="qr-home" class="p-3 bg-white rounded-2xl inline-block"></div>
      </div>
    </div>

    <div id="setup-pw-modal" class="hidden fixed inset-0 z-[1000] modal-bg flex items-center justify-center p-6">
        <div class="max-w-sm w-full bg-[#1e293b] p-8 rounded-[32px] border border-indigo-500 shadow-2xl text-center">
            <div class="w-16 h-16 bg-indigo-500/20 rounded-full flex items-center justify-center mx-auto mb-4">
                <i data-lucide="shield-check" class="text-indigo-400 w-8 h-8"></i>
            </div>
            <h3 class="text-white font-900 text-xl mb-2">비밀번호 설정</h3>
            <p class="text-slate-400 text-xs mb-6">앞으로 사용할 자신만의<br>비밀번호를 입력해 주세요.</p>
            <input id="new-pw" type="password" placeholder="새 비밀번호 입력" class="w-full px-5 py-4 rounded-2xl bg-[#0f172a] border border-[#334155] text-white outline-none mb-4 text-center">
            <button onclick="completeRegistration()" class="w-full py-4 rounded-2xl font-800 bg-indigo-600 text-white shadow-lg">설정 완료</button>
        </div>
    </div>

    <div id="teacher-view" class="hidden h-full flex flex-col">
      <header class="p-5 bg-[#1e293b] border-b border-[#334155] flex justify-between items-center sticky top-0 z-50">
        <div class="flex items-center gap-3">
          <button onclick="logout()" class="text-slate-400 hover:text-white"><i data-lucide="log-out"></i></button>
          <h2 class="text-white font-800 text-xl" id="teacher-date-title">대시보드</h2>
        </div>
        <div class="flex gap-2">
          <button id="btn-start-poll" onclick="startPollBatch()" class="hidden bg-amber-600 px-4 py-2 rounded-xl text-xs font-900 text-white animate-pulse">🗳️ 투표 시작</button>
          <button onclick="openRankModal('today')" class="bg-indigo-600 px-4 py-2 rounded-xl text-xs font-900 border border-indigo-400 text-white">🏆 랭킹</button>
          <button onclick="openUserAdminModal()" class="bg-slate-700 p-3 rounded-xl border border-slate-600"><i data-lucide="settings" class="w-5 h-5"></i></button>
          <button onclick="toggleDateModal(true)" class="bg-slate-700 p-3 rounded-xl border border-slate-600"><i data-lucide="calendar" class="w-5 h-5"></i></button>
        </div>
      </header>
      <div class="flex-1 overflow-auto p-6">
        <div id="teacher-list" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6"></div>
      </div>
    </div>

    <div id="student-view" class="hidden h-full flex flex-col">
      <header class="p-5 flex items-center justify-between bg-[#1e293b] border-b border-[#334155] sticky top-0 z-50">
        <div class="flex items-center gap-3">
          <button onclick="logout()" class="text-slate-400 hover:text-white"><i data-lucide="log-out"></i></button>
          <div onclick="openRankModal('today')" class="cursor-pointer bg-[#0f172a] px-3 py-1 rounded-2xl border border-indigo-500/30">
            <span id="display-student-name" class="text-white font-800 text-xs block leading-tight"></span>
            <span class="text-[10px] text-amber-400 font-700">🏆 랭킹 확인</span>
          </div>
        </div>
        <button onclick="toggleDateModal(true)" class="bg-[#0f172a] px-4 py-2 rounded-xl border border-[#334155] text-xs font-800">기록</button>
      </header>
      <div class="flex-1 overflow-auto p-5 space-y-4" id="student-list"></div>
      <div class="p-6 bg-[#1e293b] border-t border-[#475569]">
        <form id="question-form" class="max-w-2xl mx-auto flex gap-2">
          <input id="inp-question" placeholder="질문을 입력하세요..." class="flex-1 px-5 py-4 rounded-2xl bg-[#0f172a] text-white border border-[#334155] outline-none" required>
          <button type="submit" class="px-6 rounded-2xl font-800 bg-[#6366f1] text-white">전송</button>
        </form>
      </div>
    </div>

    <div id="user-admin-modal" class="hidden fixed inset-0 z-[600] modal-bg flex items-center justify-center p-6" onclick="this.classList.add('hidden')">
        <div class="max-w-2xl w-full bg-[#1e293b] rounded-[32px] border border-slate-600 flex flex-col max-h-[80vh] overflow-hidden shadow-2xl" onclick="event.stopPropagation()">
            <div class="p-6 border-b border-slate-700 bg-slate-800/50 flex justify-between items-center"><h3 class="text-xl font-900 text-white">회원 관리</h3></div>
            <div id="user-admin-list" class="flex-1 overflow-auto p-6 grid grid-cols-1 sm:grid-cols-2 gap-4 no-scrollbar"></div>
        </div>
    </div>

    <div id="rank-modal" class="hidden fixed inset-0 z-[600] modal-bg flex items-center justify-center p-4" onclick="this.classList.add('hidden')">
        <div class="max-w-md w-full bg-[#1e293b] rounded-[32px] border border-slate-600 flex flex-col max-h-[85vh] overflow-hidden" onclick="event.stopPropagation()">
            <div class="p-6 border-b border-slate-700 bg-slate-800/50 text-center">
                <h3 class="text-xl font-900 text-white mb-4">🏆 명예의 전당</h3>
                <div class="flex bg-[#0f172a] p-1 rounded-xl border border-slate-700 gap-1">
                    <button onclick="updateRankContent('today')" id="rank-tab-today" class="flex-1 py-2 text-[10px] font-800 rounded-lg">오늘</button>
                    <button onclick="updateRankContent('week')" id="rank-tab-week" class="flex-1 py-2 text-[10px] font-800 rounded-lg">주별</button>
                    <button onclick="updateRankContent('month')" id="rank-tab-month" class="flex-1 py-2 text-[10px] font-800 rounded-lg">월별</button>
                    <button onclick="updateRankContent('all')" id="rank-tab-all" class="flex-1 py-2 text-[10px] font-800 rounded-lg">전체</button>
                </div>
            </div>
            <div id="rank-list-content" class="flex-1 overflow-auto p-6 space-y-3 no-scrollbar"></div>
        </div>
    </div>

    <div id="share-modal" class="hidden fixed inset-0 z-[500] modal-bg flex items-center justify-center p-4">
      <div class="bg-[#1e293b] w-full max-w-2xl h-[85vh] rounded-[32px] border-2 border-indigo-500 flex flex-col overflow-hidden">
        <div class="p-6 border-b border-slate-700 flex justify-between items-center bg-indigo-900/40">
          <div><h3 class="text-white font-900">실시간 토론</h3><p id="share-student-name" class="text-indigo-300 text-[10px]"></p></div>
          <button onclick="finishDiscussion()" id="btn-finish-disc" class="hidden bg-rose-600 px-6 py-2 rounded-xl text-xs font-900 text-white">토론 종료</button>
        </div>
        <div id="share-content" class="p-8 bg-[#0f172a]/60 text-white text-xl font-800 text-center italic border-b border-slate-800"></div>
        <div id="share-comments" class="flex-1 overflow-y-auto p-6 space-y-4 no-scrollbar"></div>
        <div class="p-6 bg-[#1e293b] border-t border-slate-700 flex gap-3">
          <input id="comment-input" type="text" placeholder="의견을 남겨주세요..." class="flex-1 bg-[#0f172a] border border-slate-600 rounded-2xl px-5 py-4 text-white outline-none">
          <button onclick="sendComment()" class="bg-indigo-600 px-6 rounded-2xl font-900 text-white">게시</button>
        </div>
      </div>
    </div>

    <div id="poll-modal" class="hidden fixed inset-0 z-[500] modal-bg flex items-center justify-center p-4">
      <div class="bg-[#1e293b] w-full max-w-md rounded-[32px] border-2 border-amber-500 flex flex-col overflow-hidden shadow-2xl">
        <div class="p-6 border-b border-slate-700 bg-amber-900/30 flex justify-between items-center">
          <h3 class="text-white font-900">베스트 질문 투표</h3>
          <button onclick="finishPoll()" id="poll-finish-btn" class="hidden bg-rose-600 px-4 py-2 rounded-xl text-xs font-900 text-white">종료</button>
        </div>
        <div id="poll-items" class="p-6 space-y-4 overflow-y-auto max-h-[60vh] no-scrollbar"></div>
      </div>
    </div>

    <div id="date-modal" class="hidden fixed inset-0 z-[110] modal-bg flex items-center justify-center p-6" onclick="toggleDateModal(false)">
      <div class="bg-[#1e293b] w-full max-w-sm rounded-3xl border border-slate-600 overflow-hidden" onclick="event.stopPropagation()">
          <div class="p-4 bg-slate-800 border-b border-slate-700 flex justify-between items-center"><h4 class="text-white font-900">날짜 선택</h4></div>
          <div id="modal-date-list" class="max-h-[50vh] overflow-y-auto p-4 space-y-2 no-scrollbar"></div>
      </div>
    </div>

    <div id="winner-modal" class="hidden fixed inset-0 z-[700] modal-bg flex items-center justify-center p-6" onclick="closeWinnerModal()">
        <div class="max-w-md w-full bg-amber-500 p-1 rounded-3xl" onclick="event.stopPropagation()"><div class="bg-[#1e293b] rounded-[22px] p-8 text-center"><div class="text-5xl mb-4">🏆</div><h2 class="text-amber-400 font-900 text-2xl mb-1" id="winner-title"></h2><p id="winner-name" class="text-white text-lg font-700 mb-6"></p><div id="winner-text" class="bg-[#0f172a]/50 p-6 rounded-2xl border border-white/10 mb-6 text-white font-800 text-xl italic"></div><button onclick="closeWinnerModal()" class="w-full py-4 bg-amber-500 text-[#0f172a] font-900 rounded-xl">닫기</button></div></div>
    </div>

  </div>

  <script>
    const firebaseConfig = {
      apiKey: "AIzaSyCTvks95Z82H4xljUqdqQRIEcJJcUT0PhA",
      authDomain: "questiondatabase-71d3e.firebaseapp.com",
      databaseURL: "https://questiondatabase-71d3e-default-rtdb.firebaseio.com",
      projectId: "questiondatabase-71d3e",
      storageBucket: "questiondatabase-71d3e.firebasestorage.app",
      messagingSenderId: "282631336520",
      appId: "1:282631336520:web:8726f50a5dc24a5d5ade7d"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    
    let currentUser = null, allData = [], allUsers = {}, selectedPollItems = new Set();
    let appLoginTime = Date.now(); 
    let pendingRegisterName = null;

    const getToday = () => {
      const now = new Date();
      const offset = now.getTimezoneOffset() * 60000;
      return new Date(now.getTime() - offset).toISOString().split('T')[0];
    };

    let teacherSelectedDate = getToday(), studentSelectedDate = getToday();
    let currentShareId = null;

    // --- 로그인 및 가입 로직 ---
    async function handleLogin() {
      const name = document.getElementById('login-name').value.trim();
      const pw = document.getElementById('login-pw').value.trim();
      if(!name || !pw) { alert("이름과 비밀번호를 입력하세요."); return; }
      
      appLoginTime = Date.now();
      
      if(name === "관리자") {
        const snap = await db.ref('users/admin').once('value');
        if(snap.val() && snap.val().pw === pw) { currentUser = { name: "관리자", role: "teacher" }; startApp(); } 
        else alert("비밀번호 오류");
        return;
      }

      const snap = await db.ref(`users/${name}`).once('value');
      const userData = snap.val();

      if(!userData) {
          if(pw === "1111") {
              pendingRegisterName = name;
              document.getElementById('setup-pw-modal').classList.remove('hidden');
          } else {
              alert("등록되지 않은 사용자입니다. 처음이라면 비번 1111을 치세요.");
          }
      } else {
          if(userData.pw === pw) {
              currentUser = { name, role: "student" };
              startApp();
          } else {
              alert("비밀번호가 틀렸습니다.");
          }
      }
    }

    async function completeRegistration() {
        const newPw = document.getElementById('new-pw').value.trim();
        if(!newPw || newPw === "1111") { alert("1111이 아닌 비밀번호를 설정하세요."); return; }
        await db.ref(`users/${pendingRegisterName}`).set({ pw: newPw, role: "student" });
        alert("설정 완료!");
        currentUser = { name: pendingRegisterName, role: "student" };
        document.getElementById('setup-pw-modal').classList.add('hidden');
        startApp();
    }

    function startApp() {
      document.getElementById('login-view').classList.add('hidden');
      if(currentUser.role === 'teacher') document.getElementById('teacher-view').classList.remove('hidden');
      else { 
        document.getElementById('student-view').classList.remove('hidden'); 
        document.getElementById('display-student-name').textContent = currentUser.name; 
      }
      initDatabase(); initUserSync(); initPollListener(); initWinnerListener(); initShareListener();
    }
    function logout() { location.reload(); }

    // --- 데이터 동기화 ---
    function initDatabase() { 
      db.ref('questions').on('value', (s) => { 
        const d = s.val(); 
        allData = d ? Object.keys(d).map(k => ({ ...d[k], id: k })) : []; 
        renderAll(); 
      }); 
    }
    function initUserSync() { 
        db.ref('users').on('value', (s) => { 
            allUsers = s.val() || {}; 
            if(currentUser && currentUser.role === 'teacher') renderUserAdmin(); 
        }); 
    }
    function renderAll() { if(currentUser.role === 'student') renderStudent(); else renderTeacher(); }

    // --- 회원 관리 (버튼 2개: 초기화 / 삭제) ---
    function openUserAdminModal() { document.getElementById('user-admin-modal').classList.remove('hidden'); renderUserAdmin(); }
    function renderUserAdmin() {
        const list = document.getElementById('user-admin-list');
        const users = Object.keys(allUsers).filter(k => k !== 'admin').sort();
        list.innerHTML = users.map(name => `
            <div class="bg-[#0f172a] p-4 rounded-xl border border-slate-700 flex flex-col gap-3">
                <div class="flex justify-between items-center">
                    <span class="text-white font-800 text-sm">${name}</span>
                    <span class="text-[10px] text-slate-500 italic">PW: ${allUsers[name].pw}</span>
                </div>
                <div class="flex gap-2">
                    <button onclick="resetUserPw('${name}')" class="flex-1 bg-amber-600/10 text-amber-500 py-2 rounded-xl text-[10px] font-800 border border-amber-500/20">초기화(1111)</button>
                    <button onclick="deleteUser('${name}')" class="flex-1 bg-rose-600/10 text-rose-500 py-2 rounded-xl text-[10px] font-800 border border-rose-500/20">계정삭제</button>
                </div>
            </div>`).join('');
    }

    async function resetUserPw(name) {
        if(confirm(`'${name}' 학생의 비밀번호를 1111로 초기화할까요?`)) {
            try {
                // 노드를 삭제하면 다음 로그인 시 다시 1111로 접속하여 가입 절차를 밟게 됩니다.
                await db.ref('users/' + name).remove();
                alert("초기화되었습니다. 이제 1111로 재가입이 가능합니다.");
            } catch(e) { alert("실패"); }
        }
    }

    async function deleteUser(name) {
        if(confirm(`'${name}' 학생을 삭제하시겠습니까?`)) {
            try {
                await db.ref('users/' + name).remove();
                alert("삭제 완료");
            } catch(e) { alert("실패"); }
        }
    }

    // --- 기존 로직들 (교사 리스트, 학생 리스트, 투표, 토론 등) ---
    function renderStars(rating = 0, clickable = false, id = '', targetName = '') {
      let h = '<div class="flex gap-1">';
      for(let i=1; i<=5; i++) {
        h += `<i data-lucide="star" onclick="${clickable ? `updateRating('${id}', ${i}, '${targetName}')` : ''}" class="w-5 h-5 cursor-pointer ${i <= rating ? 'star-active' : 'star-inactive'}"></i>`;
      }
      return h + '</div>';
    }

    async function updateRating(id, r, targetName) {
      if(!currentUser || currentUser.role !== 'teacher') return;
      await db.ref('questions/'+id).update({ rating: r, student_name: targetName });
    }

    function renderTeacher() {
      const list = document.getElementById('teacher-list');
      const filtered = allData.filter(d => d.date === teacherSelectedDate);
      document.getElementById('teacher-date-title').textContent = teacherSelectedDate;
      list.innerHTML = filtered.map(q => {
        if(q.isResult) {
            return `<div class="fade-in bg-indigo-950/40 p-5 rounded-2xl border-2 border-indigo-500/50 flex flex-col justify-between">
                <div>
                  <div class="flex items-center gap-2 mb-2"><i data-lucide="award" class="text-amber-400 w-4 h-4"></i><span class="text-white font-900 text-[10px]">결과 리포트</span></div>
                  <p class="text-white font-800 text-sm mb-3 truncate">${q.question}</p>
                  <div class="bg-indigo-900/50 p-3 rounded-xl mb-4 text-center">
                    <p class="text-slate-400 text-[9px] mb-1">학생: ${q.winner_name || q.student_name}</p>
                    <div class="flex justify-center">${renderStars(q.rating || 0, true, q.id, q.winner_name || q.student_name)}</div>
                  </div>
                </div>
                <button onclick="deleteQuestion('${q.id}')" class="text-rose-500/50 hover:text-rose-500 self-end"><i data-lucide="trash-2" class="w-4 h-4"></i></button>
            </div>`;
        }
        const isSelected = selectedPollItems.has(q.id);
        return `<div class="fade-in bg-[#1e293b] p-5 rounded-2xl border-2 ${isSelected ? 'border-amber-500 bg-amber-500/5' : 'border-slate-700'}">
          <div class="flex justify-between mb-2"><span class="text-indigo-400 font-900 text-[10px]">${q.student_name}</span>
            <div class="flex gap-2">
              <button onclick="shareQuestion('${q.id}')" class="text-emerald-400"><i data-lucide="message-square" class="w-4 h-4"></i></button>
              <button onclick="toggleSelectPoll('${q.id}')" class="${isSelected ? 'text-amber-400' : 'text-slate-500'}"><i data-lucide="check-square" class="w-4 h-4"></i></button>
              <button onclick="deleteQuestion('${q.id}')" class="text-rose-500"><i data-lucide="trash-2" class="w-4 h-4"></i></button>
            </div>
          </div>
          <p class="text-white font-600 mb-4 text-sm leading-relaxed">${q.question}</p>
          <div class="mb-4">${renderStars(q.rating || 1, true, q.id, q.student_name)}</div>
          <div class="flex gap-2"><input id="fb-${q.id}" value="${q.feedback||''}" placeholder="피드백..." class="flex-1 bg-[#0f172a] border border-slate-700 rounded-lg px-2 py-1 text-xs text-white outline-none"><button onclick="saveFeedback('${q.id}')" class="bg-indigo-600 px-3 rounded-lg text-xs font-800 text-white italic">OK</button></div></div>`;
      }).join('');
      lucide.createIcons();
      document.getElementById('btn-start-poll').classList.toggle('hidden', selectedPollItems.size === 0);
    }

    function renderStudent() {
      const list = document.getElementById('student-list');
      const filtered = allData.filter(d => d.date === studentSelectedDate && d.student_name === currentUser.name && !d.isResult);
      list.innerHTML = filtered.map(q => `<div class="fade-in bg-[#1e293b] p-5 rounded-2xl border border-slate-700 relative">
          <div class="absolute -top-3 -right-2 bg-slate-800 px-2 py-1 rounded-lg border border-slate-600">${renderStars(q.rating)}</div>
          <p class="text-white font-700 mb-2 leading-snug">${q.question}</p>
          ${q.feedback ? `<div class="p-3 bg-indigo-900/20 rounded-xl text-indigo-300 text-sm italic border-l-4 border-indigo-500">쌤: ${q.feedback}</div>` : ''}
        </div>`).join('');
      lucide.createIcons();
    }

    async function startPollBatch() {
        const items = {};
        Array.from(selectedPollItems).forEach(id => {
            const q = allData.find(x => x.id === id);
            if(q) items[id] = { question: q.question, student_name: q.student_name, votes: 0 };
        });
        await db.ref('user_votes').remove();
        await db.ref('current_poll').set({ active: true, items: items, ts: Date.now() });
        selectedPollItems.clear(); renderTeacher();
    }
    function initPollListener() {
        db.ref('current_poll').on('value', (snap) => {
            const d = snap.val(); const m = document.getElementById('poll-modal');
            if(d && d.active && d.ts > appLoginTime) {
                m.classList.remove('hidden');
                document.getElementById('poll-finish-btn').classList.toggle('hidden', currentUser.role !== 'teacher');
                const total = Object.values(d.items||{}).reduce((a,c)=>a+(c.votes||0),0);
                document.getElementById('poll-items').innerHTML = Object.keys(d.items||{}).map(id => {
                    const i = d.items[id]; const p = total>0?Math.round((i.votes||0)/total*100):0;
                    return `<div onclick="submitVote('${id}')" class="relative bg-slate-800 p-5 rounded-2xl border-2 border-slate-700 mb-2 overflow-hidden cursor-pointer"><div class="relative z-10 flex justify-between"><div><span class="text-sm font-800 text-white block">${i.question}</span><span class="text-[10px] text-slate-400">${i.student_name}</span></div><span class="text-amber-400 font-900">${p}%</span></div><div class="absolute inset-y-0 left-0 bg-amber-500/10 transition-all duration-500" style="width:${p}%"></div></div>`;
                }).join('');
            } else m.classList.add('hidden');
        });
    }
    async function finishPoll() {
        const snap = await db.ref('current_poll').once('value'); const poll = snap.val(); if(!poll) return;
        const winner = Object.values(poll.items).reduce((p, c) => ((p.votes||0) > (c.votes||0)) ? p : c);
        await db.ref('questions').push({ student_name: winner.student_name, question: `📊 투표 베스트: ${winner.question}`, date: getToday(), ts: Date.now(), isResult: true, rating: 0 });
        await db.ref('winner_broadcast').set({ name: winner.student_name, question: winner.question, type: '오늘의 BEST!', ts: Date.now() });
        await db.ref('current_poll').remove();
    }

    function openRankModal(type='today') { document.getElementById('rank-modal').classList.remove('hidden'); updateRankContent(type); }
    function updateRankContent(type) {
        ['today','week','month','all'].forEach(t=>document.getElementById(`rank-tab-${t}`).classList.toggle('tab-active', t===type));
        const scores = {};
        allData.forEach(q => { if(q.rating) scores[q.student_name] = (scores[q.student_name]||0) + q.rating; });
        const sorted = Object.entries(scores).sort((a,b)=>b[1]-a[1]);
        document.getElementById('rank-list-content').innerHTML = sorted.map(([name, score], idx) => `<div class="flex items-center justify-between p-4 rounded-2xl bg-slate-800 border border-slate-700"><div class="flex items-center gap-3"><span class="text-indigo-400 font-900 w-4">${idx+1}</span><span class="text-white font-700 text-sm">${name}</span></div><div class="flex items-center gap-1 text-amber-400 font-900 text-sm">${score} <i data-lucide="star" class="w-4 h-4 fill-amber-400"></i></div></div>`).join('');
        lucide.createIcons();
    }
    async function submitVote(id) { if(currentUser.role==='teacher') return; const ref=db.ref(`user_votes/${currentUser.name}`); const old=(await ref.once('value')).val(); if(old===id) return; if(old) await db.ref(`current_poll/items/${old}/votes`).transaction(c=>(c||1)-1); await db.ref(`current_poll/items/${id}/votes`).transaction(c=>(c||0)+1); await ref.set(id); }
    async function saveFeedback(id) { const fb=document.getElementById('fb-'+id).value; await db.ref('questions/'+id).update({ feedback: fb }); alert('저장!'); }
    async function deleteQuestion(id) { if(confirm("삭제?")) await db.ref('questions/'+id).remove(); }
    function toggleSelectPoll(id) { if(selectedPollItems.has(id)) selectedPollItems.delete(id); else selectedPollItems.add(id); renderTeacher(); }
    function toggleDateModal(show) { document.getElementById('date-modal').classList.toggle('hidden', !show); if(show) updateDateList(); }
    function updateDateList() { const dates=[...new Set(allData.map(d=>d.date))].sort().reverse(); document.getElementById('modal-date-list').innerHTML=dates.map(d=>`<button onclick="selectDate('${d}')" class="w-full py-3 bg-slate-800 rounded-xl text-white border border-slate-700">${d}</button>`).join(''); }
    function selectDate(d) { if(currentUser.role==='teacher') teacherSelectedDate=d; else studentSelectedDate=d; renderAll(); toggleDateModal(false); }
    async function shareQuestion(id) { const q=allData.find(x=>x.id===id); await db.ref('current_share').set({ active: true, qId: id, question: q.question, student_name: q.student_name, ts: Date.now() }); }
    function initShareListener() { db.ref('current_share').on('value', (s) => { const d=s.val(); const m=document.getElementById('share-modal'); if(d && d.active && d.ts>appLoginTime) { currentShareId=d.qId; m.classList.remove('hidden'); document.getElementById('share-content').textContent=d.question; document.getElementById('btn-finish-disc').classList.toggle('hidden', currentUser.role !== 'teacher'); loadComments(d.qId); } else m.classList.add('hidden'); }); }
    async function finishDiscussion() {
        const cSnap=await db.ref(`comments/${currentShareId}`).once('value'); const comments=cSnap.val();
        if(comments) {
            const best=Object.values(comments).reduce((p,c)=>((p.likes?Object.keys(p.likes).length:0) > (c.likes?Object.keys(c.likes).length:0))?p:c);
            await db.ref('questions').push({ student_name: best.name, question: `💬 토론 베스트: ${best.text}`, date: getToday(), ts: Date.now(), isResult: true, rating: 0 });
            await db.ref('winner_broadcast').set({ name: best.name, question: best.text, type: '베스트 의견!', ts: Date.now() });
        }
        await db.ref('current_share').remove();
    }
    function loadComments(id) { db.ref(`comments/${id}`).on('value', (s) => { const c=s.val()||{}; const cont=document.getElementById('share-comments'); cont.innerHTML=Object.keys(c).map(k=>`<div class="flex flex-col ${c[k].name===currentUser.name?'items-end':'items-start'}"><div class="bg-slate-700 px-4 py-2 rounded-xl text-sm mb-2 relative">${c[k].text}<button onclick="likeComment('${id}','${k}')" class="absolute -bottom-2 -right-2 bg-slate-800 px-2 py-0.5 rounded-full text-[10px] border border-slate-600">❤️ ${c[k].likes?Object.keys(c[k].likes).length:0}</button></div></div>`).join(''); cont.scrollTop=cont.scrollHeight; }); }
    async function likeComment(qId, cId) { await db.ref(`comments/${qId}/${cId}/likes/${currentUser.name}`).set(true); }
    async function sendComment() { const inp=document.getElementById('comment-input'); if(!inp.value.trim()) return; await db.ref(`comments/${currentShareId}`).push({ name: currentUser.name, text: inp.value, ts: Date.now() }); inp.value=''; }
    function initWinnerListener() { db.ref('winner_broadcast').on('value', (s) => { const d=s.val(); if(d && d.ts>appLoginTime) { document.getElementById('winner-name').textContent=d.name; document.getElementById('winner-text').textContent=d.question; document.getElementById('winner-modal').classList.remove('hidden'); } else document.getElementById('winner-modal').classList.add('hidden'); }); }
    async function closeWinnerModal() { document.getElementById('winner-modal').classList.add('hidden'); if(currentUser && currentUser.role==='teacher') await db.ref('winner_broadcast').remove(); }
    document.getElementById('question-form').onsubmit=async (e) => { e.preventDefault(); const inp=document.getElementById('inp-question'); if(!inp.value.trim()) return; await db.ref('questions').push({ student_name: currentUser.name, question: inp.value, date: getToday(), ts: Date.now(), rating: 1 }); inp.value=''; };
    function generateQR(c) { const qr=qrcode(0,'M'); qr.addData(window.location.href); qr.make(); c.innerHTML=qr.createSvgTag(4,0); }
    generateQR(document.getElementById('qr-home')); lucide.createIcons();
  </script>
</body>
</html>
