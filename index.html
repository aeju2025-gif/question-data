<!doctype html>
<html lang="ko" class="h-full">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>서남 5-1 사고의 방 v3.1</title>
  <script src="https://cdn.tailwindcss.com/3.4.17"></script>
  <script src="https://cdn.jsdelivr.net/npm/lucide@0.263.0/dist/umd/lucide.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/qrcode-generator@1.4.4/qrcode.min.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    * { font-family: 'Pretendard', sans-serif; -webkit-tap-highlight-color: transparent; }
    .fade-in { animation: fadeIn 0.3s ease; }
    @keyframes fadeIn { from { opacity:0; transform:translateY(5px); } to { opacity:1; transform:translateY(0); } }
    .modal-bg { backdrop-filter: blur(16px); background: rgba(15, 23, 42, 0.9); }
    .tab-active { background-color: #6366f1; color: white; border-color: #6366f1; }
    .star-active { fill: #fbbf24; color: #fbbf24; }
    .star-inactive { fill: none; color: #475569; }
    .no-scrollbar::-webkit-scrollbar { display: none; }
    .result-card { border: 2px solid #818cf8; background: rgba(49, 46, 129, 0.3); cursor: pointer; transition: all 0.2s; }
    .result-card:hover { background: rgba(49, 46, 129, 0.5); transform: translateY(-2px); }
  </style>
</head>
<body class="h-full bg-[#0f172a] text-[#e2e8f0]">

  <div id="app" class="h-full w-full overflow-auto">
    
    <div id="login-view" class="flex items-center justify-center h-full p-6">
      <div class="max-w-md w-full bg-[#1e293b] p-8 rounded-3xl border border-[#334155] shadow-2xl text-center">
        <h1 class="text-3xl font-800 text-white mb-2 italic text-indigo-400">서남 5-1 사고의 방</h1>
        <p class="text-slate-400 text-sm mb-8">생각의 기록, 별점의 보상</p>
        <div class="space-y-4 mb-8 text-left">
          <input id="login-name" type="text" placeholder="이름" class="w-full px-5 py-4 rounded-2xl bg-[#0f172a] border border-[#334155] text-white outline-none">
          <input id="login-pw" type="password" placeholder="비밀번호" class="w-full px-5 py-4 rounded-2xl bg-[#0f172a] border border-[#334155] text-white outline-none">
          <button onclick="handleLogin()" class="w-full py-5 rounded-2xl font-800 text-xl bg-[#6366f1] text-white shadow-lg">입장하기</button>
        </div>
        <div id="qr-home" class="p-3 bg-white rounded-2xl inline-block"></div>
      </div>
    </div>

    <div id="teacher-view" class="hidden h-full flex flex-col">
      <header class="p-5 bg-[#1e293b] border-b border-[#334155] flex justify-between items-center sticky top-0 z-50">
        <div class="flex items-center gap-3">
          <button onclick="logout()" class="text-slate-400 hover:text-white"><i data-lucide="log-out"></i></button>
          <h2 class="text-white font-800 text-xl" id="teacher-date-title">대시보드</h2>
        </div>
        <div class="flex gap-2">
          <button onclick="clearTodayBoard()" class="bg-rose-900/30 text-rose-500 p-3 rounded-xl border border-rose-500/30"><i data-lucide="trash-2" class="w-5 h-5"></i></button>
          <button id="btn-start-poll" onclick="startPollBatch()" class="hidden bg-amber-600 px-4 py-2 rounded-xl text-xs font-900 text-white animate-pulse">🗳️ 투표 시작</button>
          <button onclick="openRankModal('today')" class="bg-indigo-600 px-4 py-2 rounded-xl text-xs font-900 border border-indigo-400 text-white">🏆 랭킹</button>
          <button onclick="openUserAdminModal()" class="bg-slate-700 p-3 rounded-xl border border-slate-600"><i data-lucide="settings" class="w-5 h-5"></i></button>
          <button onclick="toggleDateModal(true)" class="bg-slate-700 p-3 rounded-xl border border-slate-600"><i data-lucide="calendar" class="w-5 h-5"></i></button>
        </div>
      </header>
      <div class="flex-1 overflow-auto p-6">
        <div id="teacher-list" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6"></div>
      </div>
    </div>

    <div id="student-view" class="hidden h-full flex flex-col">
        <header class="p-5 flex items-center justify-between bg-[#1e293b] border-b border-[#334155] sticky top-0 z-50">
          <div class="flex items-center gap-3">
            <button onclick="logout()" class="text-slate-400 hover:text-white"><i data-lucide="log-out"></i></button>
            <div onclick="openRankModal('today')" class="cursor-pointer bg-[#0f172a] px-3 py-1 rounded-2xl border border-indigo-500/30">
              <span id="display-student-name" class="text-white font-800 text-xs block"></span>
              <span class="text-[10px] text-amber-400 font-700 underline italic">내 랭킹 확인</span>
            </div>
          </div>
          <button onclick="toggleDateModal(true)" class="bg-[#0f172a] px-4 py-2 rounded-xl border border-[#334155] text-xs font-800">기록</button>
        </header>
        <div class="flex-1 overflow-auto p-5 space-y-4" id="student-list"></div>
        <div class="p-6 bg-[#1e293b] border-t border-[#475569]">
          <form id="question-form" class="max-w-2xl mx-auto flex gap-3">
            <input id="inp-question" placeholder="질문을 입력하세요..." class="flex-1 px-5 py-4 rounded-2xl bg-[#0f172a] text-white border border-[#334155] outline-none" required>
            <button type="submit" class="px-8 rounded-2xl font-800 bg-[#6366f1] text-white shadow-lg">전송</button>
          </form>
        </div>
    </div>

    <div id="review-modal" class="hidden fixed inset-0 z-[800] modal-bg flex items-center justify-center p-6" onclick="this.classList.add('hidden')">
        <div class="max-w-md w-full bg-[#1e293b] rounded-[32px] border-2 border-indigo-400 p-8 text-center shadow-2xl" onclick="event.stopPropagation()">
            <div class="text-4xl mb-4" id="review-icon">🏆</div>
            <h3 class="text-indigo-300 font-900 text-sm mb-2" id="review-type">지난 투표 결과</h3>
            <p class="text-white font-800 text-xl mb-4 italic" id="review-question"></p>
            <div class="bg-[#0f172a] p-4 rounded-2xl border border-slate-700 mb-6">
                <span class="text-slate-400 text-xs block mb-1">선정된 학생</span>
                <span class="text-amber-400 font-900 text-lg" id="review-winner"></span>
            </div>
            <button onclick="document.getElementById('review-modal').classList.add('hidden')" class="w-full py-4 bg-slate-700 text-white font-800 rounded-2xl">닫기</button>
        </div>
    </div>

    <div id="rank-modal" class="hidden fixed inset-0 z-[600] modal-bg flex items-center justify-center p-4" onclick="this.classList.add('hidden')">
        <div class="max-w-lg w-full bg-[#1e293b] rounded-[32px] border border-slate-600 flex flex-col max-h-[85vh] overflow-hidden" onclick="event.stopPropagation()">
            <div class="p-6 border-b border-slate-700 bg-slate-800/50">
                <h3 class="text-xl font-900 text-white mb-4 italic">🏆 명예의 전당</h3>
                <div class="grid grid-cols-4 gap-1 bg-[#0f172a] p-1 rounded-xl border border-slate-700">
                    <button onclick="updateRankContent('today')" id="rank-tab-today" class="py-2 text-[11px] font-800 rounded-lg">오늘</button>
                    <button onclick="updateRankContent('weekly')" id="rank-tab-weekly" class="py-2 text-[11px] font-800 rounded-lg">주간</button>
                    <button onclick="updateRankContent('monthly')" id="rank-tab-monthly" class="py-2 text-[11px] font-800 rounded-lg">월간</button>
                    <button onclick="updateRankContent('all')" id="rank-tab-all" class="py-2 text-[11px] font-800 rounded-lg">전체</button>
                </div>
            </div>
            <div id="rank-list-content" class="flex-1 overflow-auto p-6 space-y-3 no-scrollbar"></div>
        </div>
    </div>

    <div id="share-modal" class="hidden fixed inset-0 z-[500] modal-bg flex items-center justify-center p-4">
        <div class="bg-[#1e293b] w-full max-w-2xl h-[85vh] rounded-[32px] border-2 border-indigo-500 flex flex-col overflow-hidden">
            <div class="p-6 border-b border-slate-700 flex justify-between items-center bg-indigo-900/40">
                <div><h3 class="text-white font-900 text-lg">LIVE DISCUSSION</h3><p id="share-student-name" class="text-indigo-300 text-[10px] font-700 uppercase"></p></div>
                <div class="flex gap-2">
                    <button onclick="document.getElementById('share-modal').classList.add('hidden')" class="bg-slate-700 px-4 py-2 rounded-xl text-xs text-white">닫기</button>
                    <button onclick="finishDiscussion()" id="btn-finish-disc" class="hidden bg-rose-600 px-6 py-2 rounded-xl text-xs font-900 text-white">토론 종료</button>
                </div>
            </div>
            <div id="share-content" class="p-8 bg-[#0f172a]/60 text-white text-xl font-800 border-b border-slate-800 italic text-center"></div>
            <div id="share-comments" class="flex-1 overflow-y-auto p-6 space-y-4 no-scrollbar"></div>
            <div class="p-6 bg-[#1e293b] border-t border-slate-700 flex gap-3">
                <input id="comment-input" type="text" placeholder="의견을 남겨주세요..." class="flex-1 bg-[#0f172a] border border-slate-600 rounded-2xl px-5 py-4 text-white outline-none">
                <button onclick="sendComment()" class="bg-indigo-600 px-6 rounded-2xl font-900 text-white">게시</button>
            </div>
        </div>
    </div>

    <div id="poll-modal" class="hidden fixed inset-0 z-[550] modal-bg flex items-center justify-center p-4">
        <div class="bg-[#1e293b] w-full max-w-md rounded-[32px] border-2 border-amber-500 flex flex-col overflow-hidden">
            <div class="p-6 border-b border-slate-700 bg-amber-900/30 flex justify-between items-center">
                <h3 class="text-white font-900 text-lg italic">BEST QUESTION POLL</h3>
                <button onclick="finishPoll()" id="poll-finish-btn" class="hidden bg-rose-600 px-4 py-2 rounded-xl text-xs font-900 text-white">종료</button>
            </div>
            <div id="poll-items" class="p-6 space-y-4 overflow-y-auto max-h-[60vh] no-scrollbar"></div>
        </div>
    </div>

    <div id="winner-modal" class="hidden fixed inset-0 z-[700] modal-bg flex items-center justify-center p-6" onclick="closeWinnerModal()">
        <div class="max-w-md w-full bg-amber-500 p-1 rounded-3xl">
            <div class="bg-[#1e293b] rounded-[22px] p-8 text-center" onclick="event.stopPropagation()">
                <div class="text-5xl mb-4">🏆</div>
                <h2 class="text-amber-400 font-900 text-2xl mb-1" id="winner-title"></h2>
                <p id="winner-name" class="text-white text-lg font-700 mb-6"></p>
                <div id="winner-text" class="bg-[#0f172a]/50 p-6 rounded-2xl border border-white/10 mb-6 text-white font-800 text-xl italic"></div>
                <button onclick="closeWinnerModal()" class="w-full py-4 bg-amber-500 text-[#0f172a] font-900 rounded-xl">확인</button>
            </div>
        </div>
    </div>

    <div id="user-admin-modal" class="hidden fixed inset-0 z-[600] modal-bg flex items-center justify-center p-6" onclick="this.classList.add('hidden')">
        <div class="max-w-2xl w-full bg-[#1e293b] rounded-[32px] border border-slate-600 flex flex-col max-h-[80vh] overflow-hidden" onclick="event.stopPropagation()">
            <div class="p-6 border-b border-slate-700 flex justify-between items-center">
                <h3 class="text-xl font-900 text-white">학생 관리</h3>
                <button onclick="bulkAddUsers()" class="text-xs bg-indigo-600 px-4 py-2 rounded-xl font-900 text-white">일괄 등록</button>
            </div>
            <div id="user-admin-list" class="flex-1 overflow-auto p-6 grid grid-cols-1 sm:grid-cols-2 gap-4"></div>
        </div>
    </div>
    <div id="date-modal" class="hidden fixed inset-0 z-[110] modal-bg flex items-center justify-center p-6" onclick="toggleDateModal(false)">
      <div class="bg-[#1e293b] w-full max-w-sm rounded-3xl border border-slate-600 overflow-hidden" onclick="event.stopPropagation()">
          <div id="modal-date-list" class="max-h-[50vh] overflow-y-auto p-4 space-y-2 no-scrollbar"></div>
      </div>
    </div>

  </div>

  <script>
    // --- 설정 ---
    const firebaseConfig = {
      apiKey: "AIzaSyCTvks95Z82H4xljUqdqQRIEcJJcUT0PhA",
      authDomain: "questiondatabase-71d3e.firebaseapp.com",
      projectId: "questiondatabase-71d3e",
      storageBucket: "questiondatabase-71d3e.firebasestorage.app",
      messagingSenderId: "282631336520",
      appId: "1:282631336520:web:8726f50a5dc24a5d5ade7d",
      measurementId: "G-Y9F1XGFQMF",
      databaseURL: "https://questiondatabase-71d3e-default-rtdb.firebaseio.com"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    
    let currentUser = null, allData = [], allUsers = {}, selectedPollItems = new Set();
    let appLoginTime = Date.now();
    const getToday = () => new Date().toLocaleDateString('sv-SE');
    let teacherSelectedDate = getToday(), studentSelectedDate = getToday(), currentShareId = null;

    // --- 유틸 ---
    function getStarsHTML(count, clickable = false, qId = null) {
        let html = '<div class="flex gap-1 items-center">';
        for (let i = 1; i <= 5; i++) {
            const isActive = i <= count;
            const clickAttr = clickable ? `onclick="saveThinkingLevel('${qId}', ${i})"` : '';
            html += `<i data-lucide="star" ${clickAttr} class="w-5 h-5 cursor-pointer ${isActive ? 'star-active' : 'star-inactive'}"></i>`;
        }
        html += `<span class="ml-2 text-sm font-900 text-amber-500">${count} ⭐</span></div>`;
        return html;
    }

    // --- 인증 ---
    async function handleLogin() {
      const name = document.getElementById('login-name').value.trim();
      const pw = document.getElementById('login-pw').value.trim();
      if(!name) return;
      if(name === "관리자") {
        const snap = await db.ref('users/admin').once('value');
        if(snap.val() && snap.val().pw === pw) { currentUser = { name: "관리자", role: "teacher" }; startApp(); } else alert("비밀번호 오류");
        return;
      }
      const snap = await db.ref(`users/${name}`).once('value');
      let data = snap.val();
      if(data && data.pw === pw) { currentUser = { name, role: "student" }; startApp(); } else alert("정보 불일치");
    }
    function startApp() {
      document.getElementById('login-view').classList.add('hidden');
      if(currentUser.role === 'teacher') document.getElementById('teacher-view').classList.remove('hidden');
      else { document.getElementById('student-view').classList.remove('hidden'); document.getElementById('display-student-name').textContent = currentUser.name; }
      initSync();
    }
    function logout() { location.reload(); }

    function initSync() { 
      db.ref('questions').on('value', (s) => { 
        const d = s.val(); 
        allData = d ? Object.keys(d).map(k => ({ ...d[k], id: k })) : []; 
        renderAll(); 
      }); 
      db.ref('users').on('value', (s) => { allUsers = s.val() || {}; if(currentUser.role === 'teacher') renderUserAdmin(); });
      initShareListener();
      initPollListener();
      initWinnerListener();
    }
    function renderAll() { if(currentUser.role === 'student') renderStudent(); else renderTeacher(); }

    // --- [기능] 다시보기 팝업 ---
    function openReview(id) {
        const q = allData.find(x => x.id === id);
        if(!q) return;
        document.getElementById('review-icon').textContent = q.question.includes('토론') ? '💬' : '🏆';
        document.getElementById('review-type').textContent = q.question.includes('토론') ? '토론 베스트 의견' : '투표 베스트 질문';
        document.getElementById('review-question').textContent = q.originalQuestion || "상세 정보가 없습니다.";
        document.getElementById('review-winner').textContent = q.winnerName || "기록 없음";
        document.getElementById('review-modal').classList.remove('hidden');
    }

    // --- 렌더링: 선생님 ---
    function renderTeacher() {
      const list = document.getElementById('teacher-list');
      const filtered = allData.filter(d => d.date === teacherSelectedDate);
      document.getElementById('teacher-date-title').textContent = teacherSelectedDate;

      const grouped = filtered.reduce((acc, q) => {
        const key = q.isResult ? "🎊 수업 결과" : q.student_name;
        if (!acc[key]) acc[key] = [];
        acc[key].push(q);
        return acc;
      }, {});

      const sortedNames = Object.keys(grouped).sort();
      list.innerHTML = sortedNames.map(name => {
        const qs = grouped[name];
        const cards = qs.map(q => {
          if(q.isResult) return `<div onclick="openReview('${q.id}')" class="result-card p-4 rounded-xl mb-3 shadow-lg"><p class="text-indigo-200 text-xs font-900 leading-relaxed">${q.question}</p></div>`;
          
          const lvl = q.rating || 1;
          const isSelected = selectedPollItems.has(q.id);
          return `<div class="bg-[#2d3a4f] p-4 rounded-xl border-2 ${isSelected ? 'border-amber-500 bg-amber-500/5' : 'border-slate-700/50'} mb-3">
            <div class="flex justify-between items-center mb-2">
              <span class="text-[9px] text-slate-500">${new Date(q.ts).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'})}</span>
              <div class="flex gap-2">
                <button onclick="shareQuestion('${q.id}')" class="text-emerald-400"><i data-lucide="message-square" class="w-3.5 h-3.5"></i></button>
                <button onclick="toggleSelectPoll('${q.id}')" class="${isSelected ? 'text-amber-400' : 'text-slate-500'}"><i data-lucide="check-square" class="w-3.5 h-3.5"></i></button>
                <button onclick="deleteQuestion('${q.id}')" class="text-rose-500"><i data-lucide="trash-2" class="w-3.5 h-3.5"></i></button>
              </div>
            </div>
            <p class="text-white font-600 mb-4 text-[13px] leading-relaxed">${q.question}</p>
            <div class="mb-4">${getStarsHTML(lvl, true, q.id)}</div>
            <div class="flex gap-1"><input id="fb-${q.id}" value="${q.feedback||''}" placeholder="피드백..." class="flex-1 bg-[#0f172a] border border-slate-700 rounded-lg px-2 py-1 text-[10px] text-white outline-none"><button onclick="saveFeedback('${q.id}')" class="bg-indigo-600 px-2 rounded-lg text-[10px] text-white font-800">OK</button></div>
          </div>`;
        }).join('');
        return `<div><div class="bg-indigo-500/10 border border-indigo-500/20 py-2 px-4 rounded-xl mb-3"><span class="text-indigo-300 font-900 text-xs">${name}</span></div>${cards}</div>`;
      }).join('');
      lucide.createIcons();
      document.getElementById('btn-start-poll').classList.toggle('hidden', selectedPollItems.size === 0);
    }

    // --- 렌더링: 학생 ---
    function renderStudent() {
      const list = document.getElementById('student-list');
      const filtered = allData.filter(d => d.date === studentSelectedDate && (d.student_name === currentUser.name || d.isResult));
      list.innerHTML = filtered.map(q => {
        if(q.isResult) return `<div onclick="openReview('${q.id}')" class="result-card p-5 rounded-2xl text-center shadow-lg"><p class="text-indigo-100 font-800 italic">${q.question}</p></div>`;
        const lvl = q.rating || 1;
        return `<div class="bg-[#1e293b] p-5 rounded-2xl border border-slate-700 shadow-md">
          <div class="flex justify-between items-start mb-3">
             <p class="text-white font-700 flex-1 pr-4 text-[15px]">${q.question}</p>
             <div class="bg-slate-900 px-3 py-1 rounded-full border border-slate-700 flex items-center gap-1"><span class="text-amber-400 font-900 text-xs">${lvl}</span><i data-lucide="star" class="star-active w-3 h-3"></i></div>
          </div>
          ${q.feedback ? `<div class="p-3 bg-indigo-900/20 rounded-xl text-indigo-300 text-[13px] italic border border-indigo-500/20">관리자: ${q.feedback}</div>` : ''}
        </div>`
      }).join('');
      lucide.createIcons();
    }

    // --- [복구 및 강화] 종료 로직: 별점 5점 자동 부여 ---
    async function finishPoll() {
        const snap = await db.ref('current_poll').once('value');
        const d = snap.val(); if(!d) return;

        const winner = d.items.reduce((p, c) => (Object.keys(p.votes||{}).length > Object.keys(c.votes||{}).length) ? p : c);
        
        // 1. 게시판 기록 (상세정보 포함)
        await db.ref('questions').push({ 
            student_name: "시스템", 
            question: `🏆 베스트 질문 선정: ${winner.student_name} (+5⭐)`, 
            originalQuestion: winner.question,
            winnerName: winner.student_name,
            date: getToday(), ts: Date.now(), isResult: true, rating: 5
        });

        // 2. 당선자에게 보너스 별점 5점 지급 (새 기록으로 추가하여 랭킹 반영)
        await db.ref('questions').push({
            student_name: winner.student_name,
            question: "🏆 베스트 질문 선정 보너스 별점",
            date: getToday(), ts: Date.now(), rating: 5, feedback: "축하합니다! 베스트 질문으로 선정되었습니다."
        });

        await db.ref('winner_broadcast').set({ name: winner.student_name, question: winner.question, type: '베스트 질문 선정!', ts: Date.now() });
        await db.ref('current_poll').remove();
    }

    async function finishDiscussion() {
        const snap = await db.ref(`comments/${currentShareId}`).once('value');
        const comments = snap.val(); if(!comments) { await db.ref('current_share').remove(); return; }

        const best = Object.values(comments).reduce((p, c) => (Object.keys(p.likes||{}).length > Object.keys(c.likes||{}).length) ? p : c);
        const shareSnap = await db.ref('current_share').once('value');
        const shareData = shareSnap.val();

        // 1. 게시판 기록
        await db.ref('questions').push({ 
            student_name: "시스템", 
            question: `💬 토론 베스트 의견: ${best.name} (+5⭐)`, 
            originalQuestion: best.text,
            winnerName: best.name,
            date: getToday(), ts: Date.now(), isResult: true, rating: 5
        });

        // 2. 보너스 별점 지급
        await db.ref('questions').push({
            student_name: best.name,
            question: "💬 토론 베스트 의견 보너스 별점",
            date: getToday(), ts: Date.now(), rating: 5, feedback: "토론에서 최고의 의견으로 선정되었습니다!"
        });

        await db.ref('winner_broadcast').set({ name: best.name, question: best.text, type: '베스트 의견 선정!', ts: Date.now() });
        await db.ref('current_share').remove();
    }

    // --- 랭킹 ---
    function openRankModal(type = 'today') { document.getElementById('rank-modal').classList.remove('hidden'); updateRankContent(type); }
    function updateRankContent(type) {
        ['today', 'weekly', 'monthly', 'all'].forEach(t => {
            document.getElementById(`rank-tab-${t}`).className = type === t ? 'py-2 text-[11px] font-800 rounded-lg tab-active' : 'py-2 text-[11px] font-800 rounded-lg text-slate-500';
        });
        const now = new Date();
        const filtered = allData.filter(q => {
            if (q.isResult && q.student_name === "시스템") return false; // 시스템 카운트는 제외
            const qDate = new Date(q.date);
            if (type === 'today') return q.date === getToday();
            if (type === 'weekly') { return Math.ceil(Math.abs(now - qDate) / (1000*60*60*24)) <= 7; }
            if (type === 'monthly') return qDate.getMonth() === now.getMonth() && qDate.getFullYear() === now.getFullYear();
            return true;
        });
        const scores = {};
        filtered.forEach(q => { if(!scores[q.student_name]) scores[q.student_name] = 0; scores[q.student_name] += (q.rating || 0); });
        const sorted = Object.entries(scores).sort((a,b) => b[1] - a[1]);
        document.getElementById('rank-list-content').innerHTML = sorted.map(([name, score], i) => `
            <div class="flex items-center justify-between p-4 rounded-2xl border ${name === currentUser.name ? 'bg-indigo-600 border-indigo-400' : 'bg-slate-800 border-slate-700'}">
                <div class="flex items-center gap-4"><div class="w-8 h-8 rounded-full bg-slate-900 flex items-center justify-center font-900 text-xs">${i+1}</div><span class="font-800">${name}</span></div>
                <div class="flex items-center gap-1 bg-black/20 px-3 py-1.5 rounded-xl"><span class="text-amber-400 font-900 text-[15px]">${score}</span><i data-lucide="star" class="star-active w-4 h-4"></i></div>
            </div>`).join('');
        lucide.createIcons();
    }

    // --- 리스너 ---
    function initPollListener() {
        db.ref('current_poll').on('value', (s) => {
            const d = s.val(); const modal = document.getElementById('poll-modal');
            if(d && d.active) {
                modal.classList.remove('hidden');
                document.getElementById('poll-finish-btn').classList.toggle('hidden', currentUser.role !== 'teacher');
                document.getElementById('poll-items').innerHTML = d.items.map(q => `<button onclick="votePoll('${q.id}')" class="w-full text-left p-4 rounded-xl bg-slate-800 border-2 border-slate-700 mb-2 text-white text-sm hover:border-amber-500">${q.question}</button>`).join('');
            } else modal.classList.add('hidden');
        });
    }
    function initShareListener() {
        db.ref('current_share').on('value', (s) => {
            const d = s.val(); const modal = document.getElementById('share-modal');
            if(d && d.active) {
                currentShareId = d.qId; modal.classList.remove('hidden');
                document.getElementById('share-content').textContent = `Q. ${d.question}`;
                document.getElementById('share-student-name').textContent = d.student_name;
                document.getElementById('btn-finish-disc').classList.toggle('hidden', currentUser.role !== 'teacher');
                loadComments(d.qId);
            } else modal.classList.add('hidden');
        });
    }

    // --- 기타 관리 함수 (전 버전과 동일) ---
    async function votePoll(qId) { const uKey = currentUser.name.replace(/\./g, '_'); const snap = await db.ref('current_poll').once('value'); const d = snap.val(); d.items.forEach(async (item, idx) => { const vRef = db.ref(`current_poll/items/${idx}/votes/${uKey}`); if(item.id === qId) await vRef.set(true); else await vRef.remove(); }); }
    async function startPollBatch() { const items = allData.filter(q => selectedPollItems.has(q.id)); await db.ref('current_poll').set({ active: true, items, ts: Date.now() }); selectedPollItems.clear(); renderTeacher(); }
    async function shareQuestion(id) { const q = allData.find(x => x.id === id); await db.ref('current_share').set({ active: true, qId: id, question: q.question, student_name: q.student_name }); }
    async function sendComment() { const inp = document.getElementById('comment-input'); if(!inp.value.trim()) return; await db.ref(`comments/${currentShareId}`).push({ name: currentUser.name, text: inp.value, ts: Date.now() }); inp.value = ''; }
    function loadComments(id) { db.ref(`comments/${id}`).on('value', (s) => { const c = s.val() || {}; const cont = document.getElementById('share-comments'); cont.innerHTML = Object.keys(c).map(k => `<div class="p-2"><div class="bg-slate-700 px-4 py-3 rounded-2xl text-white text-sm inline-block shadow-md">${c[k].text} <span class="text-[10px] text-indigo-300 ml-2 font-700">${c[k].name}</span></div></div>`).join(''); cont.scrollTop = cont.scrollHeight; }); }
    async function saveThinkingLevel(id, lvl) { await db.ref('questions/'+id).update({ rating: lvl }); }
    async function saveFeedback(id) { const fb = document.getElementById('fb-'+id).value; await db.ref('questions/'+id).update({ feedback: fb }); alert('저장 완료'); }
    async function deleteQuestion(id) { if(confirm("삭제하시겠습니까?")) await db.ref('questions/'+id).remove(); }
    function toggleSelectPoll(id) { if(selectedPollItems.has(id)) selectedPollItems.delete(id); else selectedPollItems.add(id); renderTeacher(); }
    function openUserAdminModal() { document.getElementById('user-admin-modal').classList.remove('hidden'); renderUserAdmin(); }
    function renderUserAdmin() { const cont = document.getElementById('user-admin-list'); cont.innerHTML = Object.keys(allUsers).map(name => name === 'admin' ? '' : `<div class="bg-slate-800 p-4 rounded-2xl flex justify-between items-center border border-slate-700"><div><p class="text-white font-800">${name}</p><p class="text-[10px] text-slate-500">PW: ${allUsers[name].pw}</p></div><div class="flex gap-2"><button onclick="resetUserPw('${name}')" class="text-indigo-400 p-2"><i data-lucide="rotate-ccw" class="w-4 h-4"></i></button><button onclick="deleteUser('${name}')" class="text-rose-500 p-2"><i data-lucide="user-x" class="w-4 h-4"></i></button></div></div>`).join(''); lucide.createIcons(); }
    async function resetUserPw(name) { if(confirm(`${name} 비번을 1234로 초기화?`)) await db.ref(`users/${name}`).update({ pw: "1234" }); }
    async function deleteUser(name) { if(confirm(`${name} 삭제?`)) await db.ref(`users/${name}`).remove(); }
    async function bulkAddUsers() { const raw = prompt("이름을 ,로 구분 입력"); if(!raw) return; const names = raw.split(',').map(n => n.trim()).filter(n => n); for(let n of names) await db.ref(`users/${n}`).set({ pw: "1234" }); }
    async function clearTodayBoard() { const filtered = allData.filter(d => d.date === teacherSelectedDate); if(!filtered.length) return; if(confirm("전체 삭제?")) { for(let q of filtered) await db.ref(`questions/${q.id}`).remove(); } }
    function toggleDateModal(show) { document.getElementById('date-modal').classList.toggle('hidden', !show); if(show) updateDateList(); }
    function updateDateList() { const container = document.getElementById('modal-date-list'); const dates = [...new Set(allData.filter(d => d.date).map(d => d.date))].sort().reverse(); container.innerHTML = dates.map(d => `<button onclick="selectDate('${d}')" class="w-full py-4 bg-[#0f172a] rounded-2xl text-white font-800 border border-slate-700 mb-2">${d}</button>`).join(''); }
    function selectDate(d) { if(currentUser.role==='teacher') teacherSelectedDate = d; else studentSelectedDate = d; renderAll(); toggleDateModal(false); }
    document.getElementById('question-form').onsubmit = async (e) => { e.preventDefault(); const inp = document.getElementById('inp-question'); if(!inp.value.trim()) return; await db.ref('questions').push({ student_name: currentUser.name, question: inp.value, date: getToday(), ts: Date.now(), rating: 1 }); inp.value = ''; };
    function initWinnerListener() { db.ref('winner_broadcast').on('value', (s) => { const d = s.val(); if(d && d.ts > appLoginTime) { document.getElementById('winner-title').textContent = d.type; document.getElementById('winner-name').textContent = d.name; document.getElementById('winner-text').textContent = d.question; document.getElementById('winner-modal').classList.remove('hidden'); } }); }
    async function closeWinnerModal() { document.getElementById('winner-modal').classList.add('hidden'); if(currentUser.role === 'teacher') await db.ref('winner_broadcast').remove(); }
    function generateQR(c) { const qr = qrcode(0, 'M'); qr.addData(window.location.href); qr.make(); c.innerHTML = qr.createSvgTag(4,0); }
    generateQR(document.getElementById('qr-home'));
    lucide.createIcons();
  </script>
</body>
</html>
