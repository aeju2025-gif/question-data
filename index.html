<!doctype html>
<html lang="ko" class="h-full">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>우리반 실시간 Q&A</title>
  
  <script src="https://cdn.tailwindcss.com/3.4.17"></script>
  <script src="https://cdn.jsdelivr.net/npm/lucide@0.263.0/dist/umd/lucide.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/qrcode-generator@1.4.4/qrcode.min.js"></script>
  
  <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>

  <link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    * { font-family: 'Pretendard', sans-serif; }
    .fade-in { animation: fadeIn 0.3s ease; }
    @keyframes fadeIn { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:translateY(0); } }
    .star-select { cursor: pointer; font-size: 1.2rem; transition: transform 0.1s; }
    .star-select:hover { transform: scale(1.2); }
  </style>
</head>
<body class="h-full bg-[#0f172a] text-[#e2e8f0]">
  <div id="app" class="h-full w-full overflow-auto">
    
    <div id="view-selector" class="flex items-center justify-center h-full">
      <div class="text-center p-8 max-w-md w-full">
        <div class="text-5xl mb-6">💬</div>
        <h1 class="text-3xl font-800 text-white mb-2">우리반 Q&A</h1>
        <p class="text-slate-400 mb-10 text-sm">실시간으로 질문하고 답변을 확인하세요.</p>
        <button onclick="showView('teacher')" class="w-full py-4 rounded-xl font-600 text-lg mb-4 bg-[#6366f1] text-white transition-all hover:scale-[1.02]">
          교사 대시보드
        </button> 
        <button onclick="showView('student')" class="w-full py-4 rounded-xl font-600 text-lg bg-[#1e293b] text-[#e2e8f0] border border-[#334155] transition-all hover:scale-[1.02]">
          학생 질문하기
        </button>
        <div class="mt-8 p-3 bg-white rounded-xl inline-block shadow-lg">
          <div id="qr-home"></div>
          <p class="text-slate-800 text-xs mt-2 font-700">학생 접속용 QR</p>
        </div>
      </div>
    </div>

    <div id="student-view" class="hidden h-full flex flex-col">
      <header class="p-4 flex items-center justify-between bg-[#1e293b] border-b border-[#334155]">
        <button onclick="showView('home')" class="text-slate-400 hover:text-white"><i data-lucide="arrow-left"></i></button>
        <h2 class="text-white font-700 text-lg">내 질문과 답변</h2>
        <div class="w-6"></div> </header>
      
      <div class="flex-1 overflow-auto p-4 space-y-3" id="student-list"></div>

      <div class="p-6 bg-[#1e293b] border-t border-[#475569] shadow-2xl">
        <form id="question-form" class="max-w-2xl mx-auto space-y-3">
          <input id="inp-name" type="text" placeholder="본인 이름을 정확히 입력하세요" class="w-full px-4 py-3 rounded-xl text-lg bg-[#0f172a] text-white border border-[#475569] focus:ring-2 focus:ring-[#6366f1] outline-none" required> 
          <textarea id="inp-question" placeholder="궁금한 내용을 자세히 적어주세요..." rows="4" class="w-full px-4 py-3 rounded-xl text-lg bg-[#0f172a] text-white border border-[#475569] focus:ring-2 focus:ring-[#6366f1] outline-none resize-none" required></textarea> 
          <button type="submit" id="btn-submit" class="w-full py-4 rounded-xl font-700 text-lg text-white bg-[#6366f1] hover:bg-[#4f46e5] transition-all">질문 전송 🚀</button>
        </form>
      </div>
    </div>

    <div id="teacher-view" class="hidden h-full flex flex-col">
      <header class="p-4 flex items-center justify-between bg-[#1e293b] border-b border-[#334155]">
        <div class="flex items-center gap-3">
          <button onclick="showView('home')" class="text-slate-400 hover:text-white"><i data-lucide="arrow-left"></i></button>
          <h2 class="text-white font-700 text-lg">질문 관리 (3열 보기)</h2>
        </div>
        <div class="flex items-center gap-2">
          <span id="q-count" class="bg-red-500 text-white px-3 py-1 rounded-full text-xs font-800">0개 대기</span>
        </div>
      </header>
      
      <div class="flex-1 overflow-auto p-4">
        <div id="teacher-list" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4"></div>
      </div>
    </div>
  </div>

  <script>
    // 1. Firebase 설정 (정일님 정보 그대로 유지)
    const firebaseConfig = {
      apiKey: "AIzaSyCTvks95Z82H4xljUqdqQRIEcJJcUT0PhA",
      authDomain: "questiondatabase-71d3e.firebaseapp.com",
      projectId: "questiondatabase-71d3e",
      storageBucket: "questiondatabase-71d3e.firebasestorage.app",
      messagingSenderId: "282631336520",
      appId: "1:282631336520:web:8726f50a5dc24a5d5ade7d",
      measurementId: "G-Y9F1XGFQMF",
      databaseURL: "https://questiondatabase-71d3e-default-rtdb.firebaseio.com"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    let allData = [];

    // 실시간 데이터 감시
    db.ref('questions').on('value', (snapshot) => {
      const data = snapshot.val();
      allData = data ? Object.keys(data).map(key => ({ ...data[key], id: key })) : [];
      renderAll();
    });

    function showView(v) {
      document.getElementById('view-selector').classList.toggle('hidden', v !== 'home');
      document.getElementById('student-view').classList.toggle('hidden', v !== 'student');
      document.getElementById('teacher-view').classList.toggle('hidden', v !== 'teacher');
      lucide.createIcons();
      if(v === 'student') renderStudentList(); // 학생 뷰로 갈 때 리스트 갱신
    }

    // QR 생성
    function generateQR(container) {
      const url = window.location.href.split('#')[0] + '#student';
      const qr = qrcode(0, 'M');
      qr.addData(url);
      qr.make();
      container.innerHTML = qr.createSvgTag(4, 0);
    }
    generateQR(document.getElementById('qr-home'));

    if (window.location.hash === '#student') showView('student');

    // 질문 등록
    document.getElementById('question-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const name = document.getElementById('inp-name').value.trim();
      const text = document.getElementById('inp-question').value.trim();
      const btn = document.getElementById('btn-submit');

      btn.disabled = true;
      btn.textContent = '보내는 중...';

      try {
        await db.ref('questions').push({
          student_name: name,
          question: text,
          feedback: '',
          rating: 0, // 초기 별점 0
          status: 'pending',
          created_at: new Date().toISOString()
        });
        document.getElementById('inp-question').value = '';
        alert('질문이 성공적으로 전송되었습니다! ✨');
      } catch (err) { alert('오류 발생!'); }
      
      btn.disabled = false;
      btn.textContent = '질문 전송 🚀';
    });

    function renderAll() {
      renderStudentList();
      renderTeacherList();
    }

    // [렌더링] 학생 화면
    function renderStudentList() {
      const container = document.getElementById('student-list');
      const myName = document.getElementById('inp-name').value.trim();
      
      if (!myName) {
        container.innerHTML = '<div class="text-center py-20 text-slate-500 font-700">이름을 입력하면 내 질문 목록이 나타납니다.</div>';
        return;
      }

      const myItems = allData.filter(d => d.student_name === myName);
      container.innerHTML = myItems.reverse().map(q => `
        <div class="fade-in bg-[#1e293b] border border-[#334155] rounded-xl p-4">
          <div class="text-xs text-indigo-400 font-700 mb-1">내 질문</div>
          <p class="text-white text-base mb-3">${esc(q.question)}</p>
          ${q.feedback ? `
            <div class="bg-[#0f172a] rounded-lg p-3 border border-indigo-500/30 shadow-inner">
              <div class="text-xs text-emerald-400 font-700 mb-1">선생님 답변</div>
              <p class="text-slate-200 text-sm mb-2">${esc(q.feedback)}</p>
              <div class="text-yellow-400 font-800 text-sm">부여된 별점: ${'⭐'.repeat(q.rating)}</div>
            </div>
          ` : '<p class="text-xs text-slate-500 italic">답변을 기다리는 중...</p>'}
        </div>
      `).join('');
    }

    // [렌더링] 교사 화면 (3열)
    function renderTeacherList() {
      const container = document.getElementById('teacher-list');
      const sorted = [...allData].sort((a,b) => (a.status === 'pending' ? -1 : 1));
      
      document.getElementById('q-count').textContent = allData.filter(d => d.status === 'pending').length + '개 대기';

      container.innerHTML = sorted.map(q => `
        <div class="fade-in bg-[#1e293b] border border-[#334155] rounded-xl p-4 flex flex-col justify-between shadow-md">
          <div>
            <div class="flex justify-between items-center mb-2">
              <span class="text-white font-700 text-sm bg-indigo-500/50 px-2 py-0.5 rounded">${esc(q.student_name)}</span>
              <button onclick="deleteItem('${q.id}')" class="text-slate-600 hover:text-red-400"><i data-lucide="trash-2" style="width:14px;"></i></button>
            </div>
            <p class="text-slate-200 text-base mb-3 h-20 overflow-y-auto bg-[#0f172a] p-2 rounded-lg">${esc(q.question)}</p>
          </div>

          <div class="mt-auto pt-3 border-t border-[#334155]">
            ${q.status === 'pending' ? `
              <div class="space-y-2">
                <textarea id="fb-${q.id}" placeholder="답변 입력..." class="w-full p-2 rounded-lg bg-[#0f172a] border border-[#475569] text-sm text-white resize-none"></textarea>
                <div class="flex items-center justify-between gap-2">
                  <select id="rt-${q.id}" class="bg-[#0f172a] text-yellow-400 border border-[#475569] rounded-lg px-2 py-1 text-sm outline-none">
                    <option value="5">⭐⭐⭐⭐⭐</option>
                    <option value="4">⭐⭐⭐⭐</option>
                    <option value="3">⭐⭐⭐</option>
                    <option value="2">⭐⭐</option>
                    <option value="1">⭐</option>
                  </select>
                  <button onclick="sendFeedback('${q.id}')" class="bg-indigo-600 text-white px-4 py-1.5 text-sm rounded-lg font-700 hover:bg-indigo-500 transition-all">답변완료</button>
                </div>
              </div>
            ` : `
              <div class="bg-[#0f172a] p-3 rounded-lg">
                <div class="text-xs text-indigo-400 mb-1 font-700">답변</div>
                <p class="text-sm text-slate-300 mb-1">${esc(q.feedback)}</p>
                <div class="text-yellow-400 text-sm">별점: ${'⭐'.repeat(q.rating)}</div>
              </div>
            `}
          </div>
        </div>
      `).join('');
      lucide.createIcons();
    }

    async function sendFeedback(id) {
      const feedback = document.getElementById('fb-' + id).value.trim();
      const rating = parseInt(document.getElementById('rt-' + id).value);
      if (!feedback) return alert('답변을 입력해 주세요!');
      await db.ref('questions/' + id).update({ feedback, rating, status: 'answered' });
    }

    async function deleteItem(id) {
      if (confirm('삭제하시겠습니까?')) await db.ref('questions/' + id).remove();
    }

    function esc(s) {
      const d = document.createElement('div');
      d.textContent = s;
      return d.innerHTML;
    }

    document.getElementById('inp-name').addEventListener('input', renderStudentList);
    lucide.createIcons();
  </script>
</body>
</html>
